<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran JC - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }
        .icon-header { 
            font-size: 50px; 
            color: #00a884; 
            margin-bottom: 15px; 
        }
        h2 { color: #003366; margin: 0 0 5px 0; font-size: 22px; font-weight: bold; }
        p.subtitle { color: #777; font-size: 13px; margin-bottom: 25px; }

        .menu-selector {
            text-align: left;
            margin-bottom: 20px;
        }
        label { font-size: 12px; font-weight: bold; color: #555; margin-left: 5px; }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            font-size: 15px;
            margin-top: 5px;
            outline: none;
            transition: 0.3s;
            background: #f9f9f9;
            color: #333;
        }
        select:focus { border-color: #00a884; background: #fff; }

        .btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.3s; 
            color: white;
        }
        .btn-hadir { background: #00c853; }
        .btn-hadir:hover { background: #00a846; transform: translateY(-2px); }
        .btn-absen { background: #d81b60; }
        .btn-absen:hover { background: #b0154d; transform: translateY(-2px); }
        
        #reason-container { display: none; margin-top: 15px; animation: fadeIn 0.3s; }
        textarea { 
            width: 100%; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            padding: 12px; 
            box-sizing: border-box; 
            font-family: inherit; 
            margin-bottom: 10px; 
            resize: none;
        }
        
        #status-display { 
            display: none; 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            background: #f8f9fa; 
            border: 1px solid #eee; 
            animation: fadeIn 0.5s;
        }
        .btn-back { 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            margin-top: 20px; 
            color: #003366; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 13px; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-header">
        <i class="fa-solid fa-location-dot"></i>
    </div>
    <h2>KEHADIRAN JC</h2>
    <p class="subtitle">Shalom! Silakan pilih jenis absen dan lapor kehadiran Anda.</p>

    <div class="menu-selector">
        <label><i class="fa-solid fa-list-check"></i> PILIH JENIS KEGIATAN:</label>
        <select id="jenis-kegiatan">
            <option value="Absen Kehadiran Ibadah Raya">Absen Kehadiran Ibadah Raya</option>
            <option value="Absen Kehadiran Doa">Absen Kehadiran Doa</option>
            <option value="Absen Kehadiran KD">Absen Kehadiran KD</option>
            <option value="Absen Kehadiran Pelayanan di Arso 1">Absen Kehadiran Pelayanan di Arso 1</option>
            <option value="Absen Extention">Absen Extention</option>
        </select>
    </div>

    <div id="main-buttons">
        <button class="btn btn-hadir" id="btnHadir" onclick="prosesLapor('HADIR')">
            SAYA HADIR <i class="fa-solid fa-circle-check"></i>
        </button>

        <button class="btn btn-absen" id="btnAbsen" onclick="tampilkanInputAlasan()">
            TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
        </button>
    </div>

    <div id="reason-container">
        <textarea id="alasan" rows="3" placeholder="Tulis alasan tidak hadir..."></textarea>
        <button class="btn btn-absen" onclick="prosesLapor('TIDAK HADIR')">KIRIM LAPORAN</button>
        <button style="background:none; border:none; color:#777; cursor:pointer; font-size:12px; margin-top:5px;" onclick="batalAbsen()">Kembali</button>
    </div>

    <div id="status-display">
        <strong id="status-title" style="color: #00a884; display: block; margin-bottom: 5px;"></strong>
        <span id="status-desc" style="font-size: 12px; color: #888; font-family: monospace;"></span>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</a>
</div>

<div id="modal-global" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
    <div style="background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%;">
        <i id="icon-modal" class="fa-solid fa-circle-check" style="font-size: 50px; color: #28a745; margin-bottom: 15px;"></i>
        <h3 id="judul-modal" style="color: #333; margin-top: 0;">Terimakasih</h3>
        <p id="kegiatan-modal" style="font-size: 13px; color: #003366; margin: 0; font-weight: bold;"></p>
        <p id="status-laporan" style="font-weight: bold; color: #28a745; margin-bottom: 15px; font-size: 18px;"></p>
        <div style="background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee;">
            <p id="display-alamat-global" style="font-size: 11px; color: #444; margin-bottom: 5px; line-height: 1.4;"></p>
            <p id="display-gps-global" style="font-size: 9px; color: #999; margin: 0; font-family: monospace;"></p>
        </div>
        <button onclick="tutupPopupGlobal()" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">OK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userEmail = localStorage.getItem("userEmail") || "guest@gmail.com";
    const userName = localStorage.getItem("userName") || "User";

    async function dapatkanAlamatLengkap(lat, lon) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            return data.display_name || "Lokasi tidak terdeteksi";
        } catch (error) {
            return "Gagal memuat alamat GPS";
        }
    }

    function tampilkanPopupKonfirmasi(jenisHadir, lat, lon, alamat, kegiatan) {
        const modal = document.getElementById('modal-global');
        const status = document.getElementById('status-laporan');
        const kegiatanTxt = document.getElementById('kegiatan-modal');
        const gps = document.getElementById('display-gps-global');
        const alamatDisplay = document.getElementById('display-alamat-global');
        const icon = document.getElementById('icon-modal');

        kegiatanTxt.innerText = kegiatan;

        if (jenisHadir === "HADIR") {
            status.innerText = "SAYA HADIR";
            status.style.color = "#28a745"; 
            icon.style.color = "#28a745";
            icon.className = "fa-solid fa-circle-check";
        } else {
            status.innerText = "TIDAK HADIR";
            status.style.color = "#dc3545"; 
            icon.style.color = "#dc3545";
            icon.className = "fa-solid fa-circle-xmark";
        }

        alamatDisplay.innerHTML = "<strong>Lokasi Absen:</strong><br>" + alamat;
        gps.innerText = "Koordinat: " + lat.toFixed(6) + ", " + lon.toFixed(6);
        modal.style.display = 'flex';
    }

    function tutupPopupGlobal() {
        document.getElementById('modal-global').style.display = 'none';
        location.reload(); 
    }

    function updateUIStatus(judul, deskripsi) {
        const display = document.getElementById("status-display");
        document.getElementById("status-title").innerText = judul;
        document.getElementById("status-desc").innerText = deskripsi;
        display.style.display = "block";
    }

    function tampilkanInputAlasan() {
        document.getElementById("main-buttons").style.display = "none";
        document.getElementById("reason-container").style.display = "block";
    }

    function batalAbsen() {
        document.getElementById("main-buttons").style.display = "block";
        document.getElementById("reason-container").style.display = "none";
    }

    async function prosesLapor(tipe) {
        const kegiatan = document.getElementById("jenis-kegiatan").value;
        const todayStr = new Date().toISOString().split('T')[0];
        const alasanVal = document.getElementById("alasan").value;

        // Validasi double absen untuk kegiatan yang sama di hari yang sama
        if (localStorage.getItem(`lapor_${kegiatan}_${todayStr}`)) {
            alert(`Peringatan: Anda sudah mengirim ${kegiatan} untuk hari ini.`);
            return;
        }

        if (tipe === 'TIDAK HADIR' && !alasanVal) {
            alert("Harap tuliskan alasan ketidakhadiran Anda.");
            return;
        }

        updateUIStatus("Memproses...", "Mengambil data GPS & Alamat...");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const alamatLengkap = await dapatkanAlamatLengkap(lat, lon);

                try {
                    await db.collection("kehadiran").add({
                        nama: userName,
                        email: userEmail,
                        kegiatan: kegiatan,
                        status: tipe,
                        alasan: tipe === 'TIDAK HADIR' ? alasanVal : "",
                        koordinat: `${lat}, ${lon}`,
                        alamat: alamatLengkap,
                        tanggal: firebase.firestore.FieldValue.serverTimestamp(),
                        tanggal_str: todayStr
                    });

                    localStorage.setItem(`lapor_${kegiatan}_${todayStr}`, "true");
                    document.getElementById("status-display").style.display = "none";
                    tampilkanPopupKonfirmasi(tipe, lat, lon, alamatLengkap, kegiatan);

                } catch (e) {
                    updateUIStatus("Koneksi Error", "Gagal menyimpan: " + e.message);
                }
            }, () => {
                updateUIStatus("GPS Mati", "Mohon nyalakan GPS/Lokasi HP Anda.");
            }, { enableHighAccuracy: true });
        } else {
            updateUIStatus("Browser Error", "Perangkat tidak mendukung Geolocation.");
        }
    }
</script>
</body>
</html>
