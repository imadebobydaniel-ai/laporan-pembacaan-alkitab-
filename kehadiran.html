<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Kehadiran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 10px; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-hadir { background-color: #00a14b; color: white; }
        .btn-tidak { background-color: #e91e63; color: white; }
        .form-alasan { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #ffcccc; display: none; margin-top: 10px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; resize: none; }
        .btn-group-action { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-kirim { background-color: #333; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-batal { background-color: #bbb; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-home { display: inline-block; margin-top: 25px; color: #007bff; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        /* CSS Overlay Blokir */
        #block-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        #modal-notif { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div id="block-screen">
    <i class="fa-solid fa-circle-exclamation" style="font-size: 60px; color: #ffc107; margin-bottom: 20px;"></i>
    <h2 id="block-title">MAAF!</h2>
    <p id="block-message" style="font-size: 18px; margin-top: 10px;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 20px; padding: 12px 30px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer;">KEMBALI KE MENU</button>
</div>

<div class="card">
    <h2>Lapor Kehadiran</h2>
    <p>Silakan pilih status kehadiran Anda hari ini.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="laporHadir()">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-tidak" id="btnTidakHadir" onclick="tampilAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="boxAlasan" class="form-alasan">
        <textarea id="keterangan" placeholder="Isi alasan (Sakit/Izin/Lainnya)..."></textarea>
        <div class="btn-group-action">
            <button class="btn-kirim" id="btnKirimAlasan" onclick="kirimAlasan()">Kirim</button>
            <button class="btn-batal" onclick="batalProses()">Batal</button>
        </div>
    </div>

    <a href="menu.html" class="btn-home"><i class="fa-solid fa-house"></i> Back Home</a>
</div>

<div id="modal-notif">
    <div class="modal-content">
        <i id="modal-icon" class="fa-solid" style="font-size: 50px; margin-bottom: 15px;"></i>
        <h3 id="modal-title" style="margin: 0 0 10px; color: #333;"></h3>
        <p id="modal-text" style="font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px;"></p>
        <button onclick="tutupModal()" style="background: #007bff; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">OKE</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    // FUNGSI CEK DUPLIKASI SAAT HALAMAN DIBUKA
    async function cekSudahLapor() {
        if (!userEmail) return;
        const hariIni = new Date();
        hariIni.setHours(0,0,0,0);
        const tsHariIni = firebase.firestore.Timestamp.fromDate(hariIni);

        try {
            const snap = await db.collection("kehadiran")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsHariIni)
                .get();

            if (!snap.empty) {
                const statusData = snap.docs[0].data().status;
                tampilkanPesanBlokir(`Anda tadi sudah melapor ${statusData.toUpperCase()}`);
            }
        } catch (e) { console.error(e); }
    }

    function tampilkanPesanBlokir(pesan) {
        document.getElementById('block-message').innerText = pesan;
        document.getElementById('block-screen').style.display = 'flex';
    }

    function tampilAlasan() {
        document.getElementById('btnHadir').style.display = 'none';
        document.getElementById('btnTidakHadir').style.display = 'none';
        document.getElementById('boxAlasan').style.display = 'block';
    }

    function batalProses() {
        document.getElementById('keterangan').value = "";
        document.getElementById('boxAlasan').style.display = 'none';
        document.getElementById('btnHadir').style.display = 'flex';
        document.getElementById('btnTidakHadir').style.display = 'flex';
    }

    async function laporHadir() {
        if (!userEmail) return;
        const btn = document.getElementById('btnHadir');
        btn.innerText = "Mendeteksi Lokasi...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const dataLoc = await response.json();
                const alamat = dataLoc.display_name || "Lokasi tidak terdeteksi";

                const snapUser = await db.collection("users").where("email", "==", userEmail).get();
                if (snapUser.empty) return;
                const u = snapUser.docs[0].data();

                await db.collection("kehadiran").add({
                    nama: u.nama,
                    email: userEmail,
                    komsel: String(u.komsel),
                    status: "Hadir",
                    alamat_hadir: alamat,
                    tanggal: firebase.firestore.Timestamp.now()
                });

                tampilkanPesanBlokir("Anda tadi sudah melapor HADIR");
            } catch (e) { alert("Gagal!"); btn.disabled = false; }
        }, () => { alert("Aktifkan GPS!"); btn.disabled = false; });
    }

    async function kirimAlasan() {
        const alasan = document.getElementById('keterangan').value;
        if (!alasan) return alert("Alasan wajib diisi!");
        
        const btnKirim = document.getElementById('btnKirimAlasan');
        btnKirim.innerText = "Mengirim...";
        btnKirim.disabled = true;

        try {
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            const u = snapUser.docs[0].data();

            await db.collection("kehadiran").add({
                nama: u.nama,
                email: userEmail,
                komsel: String(u.komsel),
                status: "Tidak Hadir",
                alasan: alasan,
                tanggal: firebase.firestore.Timestamp.now()
            });

            tampilkanPesanBlokir("Anda tadi sudah melapor TIDAK HADIR");
        } catch (e) { alert("Gagal!"); btnKirim.disabled = false; }
    }

    // Jalankan cek otomatis saat halaman dibuka
    window.onload = cekSudahLapor;
</script>
</body>
</html>
