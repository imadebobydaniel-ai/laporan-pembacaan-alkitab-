<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peringkat Komsel - Pondok Pemulihan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 15px;
            padding-bottom: 90px;
        }
        .container { max-width: 500px; margin: auto; }
        
        /* Card Styles */
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
            text-align: center;
        }

        h2 { color: #333; font-size: 18px; margin-bottom: 5px; }
        .info-sub { color: #666; font-size: 12px; margin-bottom: 20px; }

        /* Podium Simple */
        .podium-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            margin-bottom: 25px;
            padding-top: 10px;
        }
        .podium-item { flex: 1; text-align: center; }
        .podium-rank { font-size: 24px; margin-bottom: 5px; }
        .podium-name { font-weight: bold; font-size: 13px; color: #444; }
        .podium-score { font-size: 11px; color: #007bff; font-weight: bold; }
        
        /* Chart Box */
        .chart-box { position: relative; height: 250px; width: 100%; margin-top: 10px; }

        /* List Peringkat */
        .rank-list { text-align: left; margin-top: 20px; }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #ddd;
        }
        .rank-item.top-three { border-left-color: #ffc107; background: #fffdf5; }
        .rank-jc { font-weight: bold; font-size: 14px; color: #333; }
        .rank-val { background: #007bff; color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* Back Button Fixed */
        .btn-back-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(240,242,245,1) 70%, rgba(240,242,245,0));
            z-index: 1000;
        }
        .btn-back { 
            display: block;
            background: #007bff; 
            color: white; 
            text-align: center; 
            padding: 15px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-crown" style="color: gold;"></i> Leaderboard Komsel</h2>
        <p class="info-sub" id="current-month">Periode: Memuat...</p>

        <div class="podium-container" id="podium">
            <div class="podium-item" style="order: 2;">
                <div class="podium-rank">🥇</div>
                <div class="podium-name" id="top1-name">-</div>
                <div class="podium-score" id="top1-val">0 Laporan</div>
            </div>
            <div class="podium-item" style="order: 1;">
                <div class="podium-rank" style="font-size: 18px;">🥈</div>
                <div class="podium-name" id="top2-name">-</div>
                <div class="podium-score" id="top2-val">0</div>
            </div>
            <div class="podium-item" style="order: 3;">
                <div class="podium-rank" style="font-size: 18px;">🥉</div>
                <div class="podium-name" id="top3-name">-</div>
                <div class="podium-score" id="top3-val">0</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="chartJC"></canvas>
        </div>
    </div>

    <div class="card" style="text-align: left;">
        <h3 style="font-size: 14px; border-bottom: 2px solid #eee; padding-bottom: 10px;"><i class="fas fa-list-ol"></i> Urutan Berdasarkan Keaktifan</h3>
        <div id="rank-list" class="rank-list">
            <p style="text-align:center; color:#ccc;">Menghitung skor...</p>
        </div>
    </div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back"><i class="fas fa-arrow-left"></i> KEMBALI KE MENU</a>
    </div>
</div>

<script>
    // Konfigurasi Firebase Bapak
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function muatStatistik() {
        const sekarang = new Date();
        const namaBulan = sekarang.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        document.getElementById('current-month').innerText = `Periode: ${namaBulan}`;

        const awalBulan = new Date(sekarang.getFullYear(), sekarang.getMonth(), 1);
        const tsAwalBulan = firebase.firestore.Timestamp.fromDate(awalBulan);

        try {
            const snap = await db.collection("laporan_bacaan")
                .where("tanggal", ">=", tsAwalBulan)
                .get();

            let rekapJC = {};
            // Inisialisasi JC 1-10
            for(let i=1; i<=10; i++) { rekapJC[`JC ${i}`] = 0; }

            snap.forEach(doc => {
                const d = doc.data();
                const namaJC = d.komsel; // Pastikan field di Firestore namanya "komsel"
                if (rekapJC.hasOwnProperty(namaJC)) {
                    rekapJC[namaJC]++;
                }
            });

            // Sorting data untuk peringkat
            const sortedJC = Object.entries(rekapJC)
                .sort(([,a], [,b]) => b - a);

            updatePodium(sortedJC);
            tampilkanGrafik(rekapJC);
            tampilkanList(sortedJC);

        } catch (e) { 
            console.error("Error Database:", e); 
            document.getElementById('rank-list').innerHTML = "Gagal memuat data.";
        }
    }

    function updatePodium(sortedData) {
        if(sortedData[0]) {
            document.getElementById('top1-name').innerText = sortedData[0][0];
            document.getElementById('top1-val').innerText = sortedData[0][1] + " Laporan";
        }
        if(sortedData[1]) {
            document.getElementById('top2-name').innerText = sortedData[1][0];
            document.getElementById('top2-val').innerText = sortedData[1][1];
        }
        if(sortedData[2]) {
            document.getElementById('top3-name').innerText = sortedData[2][0];
            document.getElementById('top3-val').innerText = sortedData[2][1];
        }
    }

    function tampilkanList(sortedData) {
        let html = "";
        sortedData.forEach((item, index) => {
            const isTop = index < 3 ? 'top-three' : '';
            html += `
                <div class="rank-item ${isTop}">
                    <span class="rank-jc">${index + 1}. ${item[0]}</span>
                    <span class="rank-val">${item[1]} Lap</span>
                </div>`;
        });
        document.getElementById('rank-list').innerHTML = html;
    }

    function tampilkanGrafik(dataLaporan) {
        const ctx = document.getElementById('chartJC').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(dataLaporan),
                datasets: [{
                    label: 'Laporan',
                    data: Object.values(dataLaporan),
                    backgroundColor: '#007bff',
                    borderRadius: 5
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
                    x: { ticks: { font: { size: 10, weight: 'bold' } } }
                }
            }
        });
    }

    window.onload = muatStatistik;
</script>
</body>
</html>
