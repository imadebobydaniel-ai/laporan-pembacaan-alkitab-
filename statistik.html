<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Anggota - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --biru-tua: #003366; --biru-safir: #0056b3; --emas-lux: #D4AF37; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; color: #333; }
        .stat-container { background: white; width: 100%; max-width: 450px; margin: 0 auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--biru-tua); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--emas-lux); }
        .user-brief { padding: 20px; display: flex; align-items: center; gap: 15px; background: #eef2f7; }
        .user-brief img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--emas-lux); object-fit: cover; }
        .user-info h4 { margin: 0; color: var(--biru-tua); }
        .user-info p { margin: 0; font-size: 12px; color: #666; }
        .chart-area { padding: 20px; }
        .card-stat { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--biru-safir); }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .btn-back { display: block; text-align: center; padding: 15px; background: var(--biru-tua); color: white; text-decoration: none; font-weight: bold; margin: 20px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="stat-container">
    <div class="header">
        <h3 style="margin:0"><i class="fa-solid fa-chart-line"></i> STATISTIK ANGGOTA</h3>
    </div>

    <div class="user-brief">
        <img id="stat-foto" src="https://via.placeholder.com/60" alt="Profile">
        <div class="user-info">
            <h4 id="stat-nama">Memuat Nama...</h4>
            <p id="stat-nk">NK: -</p>
        </div>
    </div>

    <div class="chart-area">
        <div class="card-stat">
            <div class="stat-label">Total Pembacaan Alkitab</div>
            <div class="stat-val" id="total-alkitab">0</div>
        </div>

        <canvas id="myChart" style="width:100%; max-height:250px;"></canvas>
    </div>

    <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    if (userEmail) {
        // Ambil Data Profil untuk Header Statistik
        db.collection("users").where("email", "==", userEmail).onSnapshot((querySnapshot) => {
            if (!querySnapshot.empty) {
                const d = querySnapshot.docs[0].data();
                document.getElementById("stat-nama").innerText = d.nama || d.nama_lengkap || "User";
                document.getElementById("stat-nk").innerText = "NK: " + (d.nomor_komsel || d.nk || "-");
                if (d.fotoUrl) { document.getElementById("stat-foto").src = d.fotoUrl; }
            }
        });

        // Contoh Pengambilan Data Laporan (Jika Bapak punya koleksi 'laporan')
        // Disini saya buatkan simulasi grafik sederhana
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                datasets: [{
                    label: 'Progress Pembacaan',
                    data: [1, 3, 2, 5, 4, 3, 6],
                    borderColor: '#0056b3',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 86, 179, 0.1)'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } }
            }
        });
    } else {
        window.location.replace("index.html");
    }
</script>
</body>
</html>
