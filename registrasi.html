<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .reg-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #333; font-size: 22px; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .form-group input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        .btn-reg { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-reg:hover { background-color: #0056b3; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .footer-link a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <img src="logo_ppp.png" alt="Logo">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <p>Pendaftaran Anggota Komsel JC</p>
    </div>

    <form id="formRegistrasi" onsubmit="prosesDaftar(event)">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="reg_nama" placeholder="Masukkan Nama Lengkap" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg_email" placeholder="contoh@mail.com" required>
        </div>
        <div class="form-group">
            <label>Nomor HP / WhatsApp</label>
            <input type="number" id="reg_hp" placeholder="Contoh: 08123456789" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg_pass" placeholder="Buat Password" required>
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <input type="text" id="reg_alamat" placeholder="Masukkan Alamat" required>
        </div>
        <div class="form-group">
            <label>Jabatan</label>
            <select id="reg_jabatan" required>
                <option value="">-- Pilih Jabatan --</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option>
            </select>
        </div>
        <div class="form-group">
            <label>Komsel JC</label>
            <select id="reg_jc" required>
                <option value="">-- Pilih Lokasi JC --</option>
                <option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option>
                <option value="4">JC 4</option><option value="5">JC 5</option>
            </select>
        </div>
        <div class="form-group">
            <label>Golongan Darah</label>
            <select id="reg_goldar" required>
                <option value="">-- Pilih --</option>
                <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
            </select>
        </div>

        <button type="submit" class="btn-reg" id="btnSubmit">DAFTAR SEKARANG</button>
    </form>

    <div class="footer-link">
        Sudah punya akun? <a href="index.html">Masuk di sini</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function prosesDaftar(event) {
        event.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Memproses...";
        btn.disabled = true;

        const email = document.getElementById('reg_email').value.trim();
        const hp = document.getElementById('reg_hp').value.trim();

        try {
            // 1. CEK EMAIL GANDA
            const cekEmail = await db.collection("users").where("email", "==", email).get();
            if (!cekEmail.empty) {
                alert("❌ GAGAL: Email '" + email + "' sudah pernah didaftarkan pada sistem!");
                btn.innerText = "DAFTAR SEKARANG";
                btn.disabled = false;
                return;
            }

            // 2. CEK HP GANDA
            const cekHp = await db.collection("users").where("no_hp", "==", hp).get();
            if (!cekHp.empty) {
                alert("❌ GAGAL: Nomor HP '" + hp + "' sudah pernah didaftarkan pada sistem!");
                btn.innerText = "DAFTAR SEKARANG";
                btn.disabled = false;
                return;
            }

            // 3. GENERATE NK (NOMOR KOMSEL) OTOMATIS
            const jc = document.getElementById('reg_jc').value;
            const snapshot = await db.collection("users").get();
            const count = snapshot.size + 1;
            const padCount = String(count).padStart(3, '0');
            const tahun = new Date().getFullYear();
            const nk_baru = `NK-PPP-${padCount}-JC${jc}-${tahun}`;

            // 4. SIMPAN KE DATABASE
            await db.collection("users").add({
                nama: document.getElementById('reg_nama').value,
                email: email,
                no_hp: hp,
                password: document.getElementById('reg_pass').value,
                alamat: document.getElementById('reg_alamat').value,
                jabatan: document.getElementById('reg_jabatan').value,
                komsel: jc,
                gol_darah: document.getElementById('reg_goldar').value,
                nomor_komsel: nk_baru, // Ini NK yang tidak bisa diedit nanti
                tanggal_daftar: new Date().toISOString()
            });

            alert("✅ BERHASIL!\nNomor Komsel Anda: " + nk_baru);
            window.location.href = "index.html";

        } catch (error) {
            alert("🚨 KESALAHAN: " + error.message);
            btn.innerText = "DAFTAR SEKARANG";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
