<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333;">Nomor Komsel (Otomatis)</label>
    <input type="text" id="nomorOtomatis" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9; font-weight: bold; color: #555;" readonly>
</div>

<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333;">Nama Lengkap</label>
    <input type="text" placeholder="Masukkan nama lengkap" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
</div>

<script>
    // Fungsi untuk menghasilkan nomor otomatis berdasarkan input JC
    function generateNomorKomsel() {
        const jcSelect = document.querySelector('select[name="lokasi_jc"]') || { value: "1" }; // Default JC 1 jika belum pilih
        const jcValue = jcSelect.value.replace("JC ", ""); // Mengambil angka saja
        
        // Simulasi nomor urut (dalam sistem nyata ini diambil dari database)
        const nomorUrut = "001"; 
        const tahun = "2026";
        
        const formatNomor = `NK-PPP-${nomorUrut}-${jcValue}-${tahun}`;
        document.getElementById('nomorOtomatis').value = formatNomor;
    }

    // Jalankan fungsi saat halaman dimuat
    window.onload = generateNomorKomsel;

    // Jika dropdown JC berubah, nomor otomatis ikut berubah
    document.querySelector('select[name="lokasi_jc"]').addEventListener('change', generateNomorKomsel);
</script>
