<div class="form-group">
    <label>Email</label>
    <input type="email" id="reg_email" placeholder="Masukkan Email" required>
</div>
<div class="form-group">
    <label>Nomor HP / WhatsApp</label>
    <input type="number" id="reg_hp" placeholder="Contoh: 08123456789" required>
</div>
<script>
    async function prosesDaftar() {
        // 1. Ambil data dari input
        const nama = document.getElementById('reg_nama').value.trim();
        const email = document.getElementById('reg_email').value.trim();
        const hp = document.getElementById('reg_hp').value.trim();
        const pass = document.getElementById('reg_pass').value;

        // 2. Validasi Manual (Wajib Isi)
        if (!nama || !email || !hp || !pass) {
            return alert("⚠️ SEMUA KOLOM WAJIB DIISI! Jangan ada yang kosong.");
        }

        try {
            // 3. CEK EMAIL GANDA
            const cekEmail = await db.collection("users").where("email", "==", email).get();
            if (!cekEmail.empty) {
                return alert("❌ ERROR: Email ini sudah pernah didaftarkan pada sistem!");
            }

            // 4. CEK NOMOR HP GANDA
            const cekHp = await db.collection("users").where("no_hp", "==", hp).get();
            if (!cekHp.empty) {
                return alert("❌ ERROR: Nomor HP ini sudah pernah didaftarkan pada sistem!");
            }

            // 5. JIKA LOLOS CEK, BARU SIMPAN DATA
            // Masukkan logika pembuatan Nomor Komsel (NK) Abang di sini
            const dataBaru = {
                nama: nama,
                email: email,
                no_hp: hp,
                password: pass,
                // ... data lainnya ...
            };

            await db.collection("users").add(dataBaru);
            alert("✅ PENDAFTARAN BERHASIL!");
            window.location.href = "index.html";

        } catch (error) {
            alert("🚨 KENDALA SISTEM: " + error.message);
        }
    }
</script>
