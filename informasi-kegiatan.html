<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Informasi Kegiatan - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --dark: #333;
            --light: #f4f7f6;
            --success: #28a745;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { color: var(--dark); margin-bottom: 20px; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; font-size: 14px;
        }
        textarea { height: 120px; resize: vertical; }

        /* Custom Styles untuk Target Pengiriman */
        .mb-3 { margin-bottom: 20px; }
        .mb-2 { margin-bottom: 10px; }
        .d-flex { display: flex; }
        .gap-2 { gap: 10px; }
        
        .btn-outline-primary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex: 1;
        }
        .btn-outline-primary:hover, .btn-active {
            background: var(--primary);
            color: white;
        }

        .btn-send { 
            width: 100%; padding: 12px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
            font-size: 16px; transition: 0.3s; margin-top: 10px;
        }
        .btn-send:hover { background: #0056b3; }
        .btn-back { 
            display: block; text-align: center; margin-top: 15px; 
            text-decoration: none; color: #777; font-size: 14px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-bullhorn"></i> Kirim Informasi Kegiatan</h2>
    
    <div class="form-group">
        <label>Judul Pengumuman</label>
        <input type="text" id="judul" placeholder="Contoh: Jadwal Ibadah Raya">
    </div>

    <div class="form-group">
        <label>Kategori</label>
        <select id="kategori">
            <option value="Penting">Penting</option>
            <option value="Kegiatan">Kegiatan</option>
            <option value="Umum">Umum</option>
            <option value="Mendesak">Mendesak</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Target Pengiriman</label>
        <div class="d-flex gap-2 mb-2">
            <button type="button" id="btnAllJC" class="btn btn-outline-primary">
                <i class="fas fa-users"></i> Ke Semua JC (JC1-JC5)
            </button>
        </div>
        
        <select id="targetJC">
            <option value="" selected disabled>-- Atau Pilih Parsial (JC1-JC5) --</option>
            <option value="JC1">JC 1</option>
            <option value="JC2">JC 2</option>
            <option value="JC3">JC 3</option>
            <option value="JC4">JC 4</option>
            <option value="JC5">JC 5</option>
        </select>
    </div>

    <div class="form-group">
        <label>Isi Detail Informasi</label>
        <textarea id="detail" placeholder="Tuliskan detail informasi di sini..."></textarea>
    </div>

    <button class="btn-send" onclick="kirimData()"><i class="fas fa-paper-plane"></i> Publikasikan Sekarang</button>
    
    <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
</div>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    let targetStatus = ""; // Untuk menyimpan apakah "Semua JC" dipilih
    const btnAllJC = document.getElementById('btnAllJC');
    const selectJC = document.getElementById('targetJC');

    // Klik Tombol Semua JC
    btnAllJC.onclick = function() {
        targetStatus = "Semua JC";
        this.classList.add('btn-active');
        selectJC.value = ""; // Reset dropdown jika tombol ditekan
    };

    // Pilih Dropdown Parsial
    selectJC.onchange = function() {
        targetStatus = ""; // Reset status tombol jika dropdown dipilih
        btnAllJC.classList.remove('btn-active');
    };

    async function kirimData() {
        const judul = document.getElementById('judul').value;
        const kategori = document.getElementById('kategori').value;
        const detail = document.getElementById('detail').value;
        
        // Logika penentuan target
        const targetFinal = targetStatus !== "" ? targetStatus : selectJC.value;

        if(!judul || !detail || !targetFinal) {
            alert("Harap isi judul, detail, dan pilih Target Pengiriman!");
            return;
        }

        try {
            await db.collection("pengumuman_komsel").add({
                judul: judul,
                kategori: kategori,
                target: targetFinal, // Field baru untuk filter di menu nanti
                detail: detail,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                sudahDibaca: false
            });

            alert("Informasi berhasil dipublikasikan ke: " + targetFinal);
            
            // Reset form setelah berhasil
            document.getElementById('judul').value = "";
            document.getElementById('detail').value = "";
            selectJC.value = "";
            btnAllJC.classList.remove('btn-active');
            targetStatus = "";
            
        } catch (error) {
            console.error("Error menambahkan dokumen: ", error);
            alert("Gagal mengirim data.");
        }
    }
</script>

</body>
</html>
