<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h3 { margin-bottom: 20px; color: #333; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-delete { width: 100%; background: #ff4d4d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { display: inline-block; margin-top: 20px; text-decoration: none; color: #007bff; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h3><i class="fa-solid fa-gear"></i> Pengaturan Akun</h3>
        
        <div class="form-group">
            <label>Email Baru</label>
            <input type="email" id="new_email" placeholder="Masukkan email baru">
        </div>

        <div class="form-group">
            <label>Password Baru</label>
            <input type="password" id="new_password" placeholder="Masukkan password baru">
        </div>

        <div class="form-group">
            <label>Lokasi Komsel</label>
            <select id="set_komsel">
                <option value="1">JC 1</option>
                <option value="2">JC 2</option>
                <option value="3">JC 3</option>
                <option value="4">JC 4</option>
                <option value="5">JC 5</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lokasi Ibadah</label>
            <select id="set_ibadah">
                <option value="Abepura">Abepura</option>
                <option value="Sentani">Sentani</option>
                <option value="Waena">Waena</option>
            </select>
        </div>

        <button class="btn-save" onclick="updateAccount()">Simpan Perubahan</button>
        <button class="btn-delete" onclick="hapusAkun()">Hapus Akun Permanen</button>
        
        <br>
        <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const currentEmail = localStorage.getItem("userEmail");

        // Load data saat ini ke form
        async function loadSettings() {
            if (!currentEmail) { window.location.href = "index.html"; return; }
            
            const snap = await db.collection("users").where("email", "==", currentEmail).get();
            if (!snap.empty) {
                const data = snap.docs[0].data();
                document.getElementById('new_email').value = data.email;
                document.getElementById('set_komsel').value = data.komsel || "1";
                document.getElementById('set_ibadah').value = data.lokasi_ibadah || "Abepura";
            }
        }

        // Fungsi Update ke Firebase (Email, Password, Komsel, Lokasi)
        async function updateAccount() {
            const newEmail = document.getElementById('new_email').value;
            const newPass = document.getElementById('new_password').value;
            const newKomsel = document.getElementById('set_komsel').value;
            const newIbadah = document.getElementById('set_ibadah').value;

            if (!newEmail) { alert("Email tidak boleh kosong"); return; }

            try {
                const snap = await db.collection("users").where("email", "==", currentEmail).get();
                if (!snap.empty) {
                    const docId = snap.docs[0].id;
                    const updateData = {
                        email: newEmail,
                        komsel: newKomsel,
                        lokasi_ibadah: newIbadah
                    };

                    // Jika password diisi, maka update password
                    if (newPass) { updateData.password = newPass; }

                    await db.collection("users").doc(docId).update(updateData);
                    
                    // Update LocalStorage agar sesi tetap sinkron
                    localStorage.setItem("userEmail", newEmail);
                    localStorage.setItem("userKomsel", newKomsel);
                    
                    alert("Perubahan Berhasil Disimpan!");
                    location.reload();
                }
            } catch (error) {
                console.error("Error updating document: ", error);
                alert("Gagal menyimpan perubahan.");
            }
        }

        async function hapusAkun() {
            if (confirm("Apakah Anda yakin ingin menghapus akun secara permanen?")) {
                const snap = await db.collection("users").where("email", "==", currentEmail).get();
                if (!snap.empty) {
                    await db.collection("users").doc(snap.docs[0].id).delete();
                    localStorage.clear();
                    window.location.href = "index.html";
                }
            }
        }

        loadSettings();
    </script>
</body>
</html>
