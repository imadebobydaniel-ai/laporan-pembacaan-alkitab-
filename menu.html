<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- STICKY HEADER FIXED --- */
        .header-sticky-container {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: var(--putih-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
        }

        .top-info-bar { 
            background: var(--biru-tua); 
            display: flex; justify-content: space-between; 
            padding: 8px 15px; font-weight: bold; font-size: 11px; 
            border-bottom: 2px solid var(--emas-lux); color: white;
        }

        header { 
            background: white; border-bottom: 3px solid var(--hijau-zamrud); 
            padding: 12px 0; overflow: hidden; white-space: nowrap; 
        }

        .running-content { 
            display: inline-block; animation: marquee 20s linear infinite; 
            font-weight: 900; font-size: 13px; color: var(--biru-tua);
            text-transform: uppercase; letter-spacing: 1px;
        }

        @keyframes marquee { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); } 
        }

        .container { padding: 20px; max-width: 450px; margin: auto; text-align: center; }

        .profile-section { 
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 25px; border-radius: 25px; 
            box-shadow: 10px 10px 20px #d1d1d1, -10px -10px 20px #ffffff;
            margin-bottom: 15px; position: relative;
            border-top: 4px solid var(--biru-safir);
        }

        .setting-icon-profile { position: absolute; top: 18px; right: 18px; color: var(--biru-tua); font-size: 22px; }

        .profile-img-container { 
            width: 90px; height: 90px; border-radius: 50%; 
            margin: 0 auto 12px auto; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            background: white; border: 3px solid var(--emas-lux);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .profile-img-container i { font-size: 85px; color: var(--biru-safir); }

        .profile-section h2 { margin: 8px 0 2px 0; font-size: 24px; color: var(--biru-tua); font-weight: 800; }
        .profile-section p { margin: 0; color: var(--hijau-zamrud); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 0 20px 20px 20px; max-width: 450px; margin: auto; }
        .menu-box { 
            background: white; padding: 22px 10px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: var(--biru-tua); font-weight: 800; font-size: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .menu-box i { font-size: 30px; margin-bottom: 12px; color: var(--biru-safir); }
        .menu-box:active { transform: scale(0.92); }

        .btn-logout { 
            background: var(--biru-tua); color: #fff; padding: 14px 40px; 
            border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: bold; 
            display: inline-block; margin: 20px 0 40px 0; border: 2px solid var(--emas-lux);
            box-shadow: 0 4px 15px rgba(0,51,102,0.3); cursor: pointer;
        }

        /* --- MODAL LOGOUT --- */
        .modal-overlay { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="header-sticky-container">
        <div class="top-info-bar">
            <div id="display-tanggal">Memuat Tanggal...</div>
            <div id="digital-clock">00:00:00 WIT</div>
        </div>

        <header>
            <div id="running-text" class="running-content"></div>
        </header>

        <div class="container" style="padding-bottom: 10px;">
            <h3 style="margin: 0 0 15px 0; color: var(--biru-tua); text-transform: uppercase; font-size: 18px;">Portal Komsel JC</h3>
            
            <div class="profile-section">
                <a href="setting.html" class="setting-icon-profile"><i class="fa-solid fa-gear"></i></a>
                <div class="profile-img-container" id="photo-area">
                    <i class="fa-solid fa-circle-user" id="default-icon"></i>
                    <img id="user-photo" src="" style="display: none;">
                </div>
                <h2 id="disp_nama">Memuat...</h2>
                <p id="disp_komsel">KOMSEL JC</p>
            </div>
        </div>
    </div>
