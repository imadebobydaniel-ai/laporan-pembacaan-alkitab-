<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://www.gstatic.com https://apis.google.com https://www.youtube.com https://s.ytimg.com 'unsafe-inline' 'unsafe-eval'; frame-src 'self' https://www.youtube.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    
    <script>
        const isMember = localStorage.getItem("userEmail");
        const isAdmin = localStorage.getItem("adminLoggedIn");
        if (!isMember && isAdmin !== "true") {
            window.location.href = "login.html"; 
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --biru-safir: #0056b3; --biru-muda: #00e6e6; --hijau-zamrud: #2ecc71; --emas-lux: #D4AF37; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--putih-bg); margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes marqueeTop { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .top-info-bar { background: var(--biru-tua); display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; font-weight: bold; font-size: 11px; border-bottom: 2px solid var(--emas-lux); color: white; }
        header { background: var(--biru-tua); border-bottom: 3px solid var(--hijau-zamrud); padding: 12px 0; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
        .running-content { display: inline-block; padding-left: 100%; animation: marqueeTop 30s linear infinite; font-weight: 900; font-size: 13px; color: white; text-transform: uppercase; }
        .container { padding: 20px; max-width: 450px; margin: auto; text-align: center; }
        .top-section-container { position: relative; width: 100%; height: 220px; overflow: hidden; border-radius: 25px; background: #000; margin-bottom: 20px; }
        .profile-card { position: absolute; width: 100%; height: 100%; background: white; border-radius: 25px; z-index: 5; transition: 0.6s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .profile-card.closed { transform: translateX(-100%); }
        .btn-toggle-side { position: absolute; left: 0; top: 50%; transform: translateY(-50%); z-index: 10; background: #ff0000; color: white; border: none; width: 30px; height: 60px; border-radius: 0 15px 15px 0; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-box { background: white; padding: 20px 10px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--biru-tua); font-weight: 800; font-size: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
        .menu-box i { font-size: 28px; margin-bottom: 10px; color: var(--biru-safir); }
        .btn-logout { background: var(--biru-tua); color: #fff; padding: 14px 40px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 30px; }
        #email-badge { position: absolute; top: -8px; right: -8px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="top-info-bar">
        <div id="display-tanggal">Memuat Tanggal...</div>
        <div id="digital-clock">00:00:00 WIT</div>
    </div>

    <header>
        <div id="running-text" class="running-content">Selamat Datang di Portal Pondok Pemulihan Papua - Tetap Semangat Melayani!</div>
    </header>

    <div class="container">
        <h3 style="color: var(--biru-tua);">Portal Komsel JC</h3>

        <div class="top-section-container">
            <div id="profileCard" class="profile-card">
                <div style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--emas-lux); overflow: hidden; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-circle-user" id="default-icon" style="font-size: 70px; color: var(--biru-safir);"></i>
                    <img id="user-photo" src="" style="display: none; width:100%; height:100%; object-fit:cover;">
                </div>
                <h2 id="disp_nama" style="margin: 5px 0 0 0; font-size: 18px;">Memuat...</h2>
                <div id="disp_email" style="font-size: 11px; color: #666;">...</div>
            </div>

            <button id="toggleProfile" class="btn-toggle-side"><i class="fa-solid fa-chevron-left" id="toggleIcon"></i></button>
            <div id="player" style="width: 100%; height: 100%;"></div>
        </div>

        <div class="menu-grid">
            <a href="profil.html" class="menu-box"><i class="fa-solid fa-user-shield"></i>Profil Saya</a>
            <a href="kehadiran.html" class="menu-box"><i class="fa-solid fa-calendar-check"></i>Kehadiran</a>
            <a href="baca-alkitab.html" class="menu-box"><i class="fa-solid fa-book-bible"></i>Laporan Baca</a>
            <a href="capaian-doa.html" class="menu-box"><i class="fa-solid fa-hands-praying"></i>Capaian Doa</a>
            <a href="javascript:location.reload()" class="menu-box" style="color: #28a745;"><i class="fa-solid fa-arrows-rotate"></i>Refresh</a>
        </div>

        <a href="javascript:void(0)" onclick="executeLogout()" class="btn-logout">Keluar</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
            authDomain: "boby-apps-project.firebaseapp.com", 
            projectId: "boby-apps-project", 
            storageBucket: "boby-apps-project.appspot.com", 
            messagingSenderId: "125984859692", 
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // FIX: Fungsi YouTube API agar tidak Blank
        function onYouTubeIframeAPIReady() {
            db.collection("portal_media").limit(1).get().then(s => {
                let vId = "dQw4w9WgXcQ"; // Default video
                if(!s.empty) vId = s.docs[0].data().url || vId;
                
                new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: vId,
                    playerVars: { 'autoplay': 1, 'mute': 1, 'loop': 1 },
                });
            }).catch(e => console.log("Media error:", e));
        }

        function syncUser() {
            const email = localStorage.getItem("userEmail");
            if (email) {
                document.getElementById('disp_email').innerText = email;
                db.collection("users").where("email", "==", email).onSnapshot(s => {
                    if (!s.empty) {
                        const d = s.docs[0].data();
                        document.getElementById('disp_nama').innerText = d.nama || "User";
                        if (d.fotoUrl) {
                            document.getElementById('user-photo').src = d.fotoUrl;
                            document.getElementById('user-photo').style.display = "block";
                            document.getElementById('default-icon').style.display = "none";
                        }
                    }
                });
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('display-tanggal').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID') + " WIT";
        }

        function executeLogout() { localStorage.clear(); window.location.href = "login.html"; }

        window.onload = () => {
            updateTime(); setInterval(updateTime, 1000); syncUser();
            const btn = document.getElementById('toggleProfile');
            const card = document.getElementById('profileCard');
            btn.onclick = () => { card.classList.toggle('closed'); };
        };
    </script>
</body>
</html>
