<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    
    <script>
        const isMember = localStorage.getItem("userEmail");
        const isAdmin = localStorage.getItem("adminLoggedIn");
        if (!isMember && isAdmin !== "true") {
            window.location.href = "login.html"; 
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --biru-tua: #003366; 
            --biru-safir: #0056b3; 
            --hijau-zamrud: #2ecc71; 
            --emas-lux: #D4AF37; 
            --putih-bg: #f4f7fa; 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Bar Info Atas */
        .top-info-bar { background: var(--biru-tua); display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; font-size: 11px; border-bottom: 2px solid var(--emas-lux); color: white; }
        
        /* Perbaikan Running Text */
        header { 
            background: var(--biru-tua); 
            border-bottom: 3px solid var(--hijau-zamrud); 
            height: 35px;
            display: flex; align-items: center;
            overflow: hidden; position: relative;
        }
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; }
        .running-content { 
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
            font-weight: bold; color: white; text-transform: uppercase; font-size: 13px;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Container Media & Profil */
        .container { padding: 20px; max-width: 450px; margin: auto; text-align: center; }
        .top-section-container { 
            position: relative; width: 100%; height: 220px; 
            border-radius: 25px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); background: #000;
        }

        .profile-card { 
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(145deg, #ffffff, #e6e6e6); 
            border-radius: 25px; z-index: 5; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-top: 4px solid var(--biru-safir); 
        }
        .profile-card.closed { transform: translateX(-105%); }

        .btn-toggle-side { 
            position: absolute; left: 0; top: 50%; transform: translateY(-50%); 
            z-index: 10; background: #ff0000; color: white; border: none; 
            width: 30px; height: 60px; border-radius: 0 15px 15px 0; cursor: pointer;
        }

        /* Tampilan Teks di Area Media */
        #text-info-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; color: white; padding: 20px; box-sizing: border-box;
            background: linear-gradient(rgba(0,51,102,0.8), rgba(0,0,0,0.9));
        }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .menu-box { background: white; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--biru-tua); font-weight: bold; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .menu-box i { font-size: 24px; margin-bottom: 8px; color: var(--biru-safir); }
    </style>
</head>
<body>

    <div class="top-info-bar">
        <div id="display-tanggal">Memuat Tanggal...</div>
        <div id="digital-clock">00:00:00 WIT</div>
    </div>

    <header>
        <div class="marquee-container">
            <div id="running-text" class="running-content">Selamat Datang di Portal Komsel JC - Tuhan Yesus Memberkati</div>
        </div>
    </header>

    <div class="container">
        <h3 style="color: var(--biru-tua); margin-bottom: 15px;">PORTAL MEDIA PAPUA</h3>

        <div class="top-section-container">
            <div id="profileCard" class="profile-card">
                <div style="width: 70px; height: 70px; border-radius: 50%; overflow: hidden; border: 3px solid var(--emas-lux); background: #eee;">
                    <i class="fa-solid fa-user" id="default-icon" style="font-size: 50px; color: #ccc; margin-top: 10px;"></i>
                    <img id="user-photo" style="display: none; width:100%; height:100%; object-fit:cover;">
                </div>
                <h2 id="disp_nama" style="margin: 8px 0 0 0; font-size: 16px;">Memuat Nama...</h2>
                <div id="disp_email" style="font-size: 10px; color: #666;">...</div>
                <p id="disp_komsel" style="color: var(--hijau-zamrud); font-weight: bold; font-size: 11px; margin: 5px 0;">KOMSEL JC</p>
            </div>

            <button id="toggleProfile" class="btn-toggle-side">
                <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
            </button>

            <div id="media-area" style="width: 100%; height: 100%;">
                <div id="youtube-container" style="width: 100%; height: 100%;">
                    <div id="player"></div>
                </div>
                <div id="text-info-display">
                    <h4 id="info-judul" style="color: var(--emas-lux); margin: 0;">PENGUMUMAN</h4>
                    <p id="info-isi" style="font-size: 12px; text-align: center;"></p>
                </div>
            </div>
        </div>

        <div class="menu-grid">
            <a href="profil.html" class="menu-box"><i class="fa-solid fa-user-gear"></i>Profil</a>
            <a href="kehadiran.html" class="menu-box"><i class="fa-solid fa-calendar-check"></i>Absensi</a>
            <a href="baca-alkitab.html" class="menu-box"><i class="fa-solid fa-book-open"></i>Alkitab</a>
            <a href="javascript:location.reload()" class="menu-box" style="color: green;"><i class="fa-solid fa-rotate"></i>Refresh</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
            authDomain: "boby-apps-project.firebaseapp.com", 
            projectId: "boby-apps-project", 
            storageBucket: "boby-apps-project.appspot.com", 
            messagingSenderId: "125984859692", 
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let ytPlayer;

        // 1. YouTube API Ready
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%', width: '100%',
                videoId: '', 
                playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'loop': 1 },
                events: { 'onReady': () => { loadPortalContent(); } }
            });
        }

        // 2. Load Konten dari Firebase
        function loadPortalContent() {
            // Ambil Media Utama (Video/Teks)
            db.collection("portal_config").doc("main_display").onSnapshot(doc => {
                const data = doc.data();
                const textDiv = document.getElementById('text-info-display');
                const ytDiv = document.getElementById('youtube-container');

                if (data && data.type === "video") {
                    textDiv.style.display = "none";
                    ytDiv.style.display = "block";
                    const vidId = extractID(data.url);
                    if (ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(vidId);
                } else if (data) {
                    ytDiv.style.display = "none";
                    textDiv.style.display = "flex";
                    document.getElementById('info-judul').innerText = data.title || "INFO";
                    document.getElementById('info-isi').innerText = data.content || "";
                }
            });

            // Ambil Running Text
            db.collection("pengumuman_komsel").limit(1).onSnapshot(snap => {
                if (!snap.empty) {
                    const p = snap.docs[0].data();
                    document.getElementById('running-text').innerText = `${p.judul || ''} : ${p.isi || p.pesan || ''}`;
                }
            });
        }

        function extractID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : "";
        }

        // 3. Sinkronisasi User
        function syncUser() {
            const email = localStorage.getItem("userEmail");
            if (email) {
                db.collection("users").where("email", "==", email).onSnapshot(s => {
                    if (!s.empty) {
                        const d = s.docs[0].data();
                        document.getElementById('disp_nama').innerText = d.nama || "User";
                        document.getElementById('disp_email').innerText = email;
                        document.getElementById('disp_komsel').innerText = d.komsel ? "JC " + d.komsel : "KOMSEL JC";
                        if (d.fotoUrl) {
                            document.getElementById('user-photo').src = d.fotoUrl;
                            document.getElementById('user-photo').style.display = "block";
                            document.getElementById('default-icon').style.display = "none";
                        }
                    }
                });
            }
        }

        // 4. Inisialisasi
        window.onload = () => {
            syncUser();
            setInterval(() => {
                const now = new Date();
                document.getElementById('display-tanggal').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
                document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID') + " WIT";
            }, 1000);

            document.getElementById('toggleProfile').addEventListener('click', () => {
                const card = document.getElementById('profileCard');
                card.classList.toggle('closed');
                document.getElementById('toggleIcon').className = card.classList.contains('closed') ? "fa-solid fa-chevron-right" : "fa-solid fa-chevron-left";
            });
        };
    </script>
</body>
</html>
