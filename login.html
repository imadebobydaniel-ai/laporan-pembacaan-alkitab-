<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        img { width: 80px; margin-bottom: 20px; }
        h2 { margin-bottom: 10px; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0073e6; }
        .footer-link { margin-top: 20px; font-size: 14px; color: #0084ff; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgf_S-K89X7I2eO0O27-p_V-8-5YfBf_A6-O0-v-f-Z-L-x-F-E-Y-z-K-L-I/s1600/logo.png" alt="Logo">
    <h2>Portal Admin</h2>
    <p>Silakan masukkan password akses</p>
    <input type="password" id="pass" placeholder="Password Administrator">
    <button onclick="login()">Masuk Sekarang</button>
    <a href="index.html" class="footer-link">Kembali ke Beranda</a>
</div>

<script>
    function login() {
        const passwordInput = document.getElementById('pass').value;
        
        // Cek password sesuai permintaan Abang
        if (passwordInput === "admin 2026") {
            window.location.href = "admin_portal.html";
        } else {
            alert("Password Salah! Akses Ditolak.");
        }
    }
</script>

</body>
</html>
