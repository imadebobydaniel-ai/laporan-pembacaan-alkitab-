<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            display: flex;
            flex-direction: column; /* Menyusun konten ke bawah */
            align-items: center;    /* Menengahkan konten secara horizontal */
            text-align: center;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 { 
            margin: 0 0 5px 0; 
            color: #1c1e21;
            font-size: 24px;
        }

        .subtitle { 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 25px; 
        }

        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #0056b3;
        }

        .btn-register {
            display: inline-block; 
            margin-top: 10px; 
            color: #007bff;
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
        }

        .error { 
            color: #dc3545; 
            font-size: 12px; 
            margin-top: 5px; 
            display: none; 
        }

        hr {
            width: 100%;
            margin: 25px 0; 
            border: 0; 
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://ui-avatars.com/api/?name=PPP&background=007bff&color=fff" alt="Logo" class="login-logo">
    
    <h2>Masuk Aplikasi</h2>
    <p class="subtitle">Gunakan Nomor KTP Anda untuk masuk</p>
    
    <input type="text" id="loginKtp" placeholder="Masukkan Nomor KTP">
    <div id="errorMessage" class="error">Nomor KTP tidak ditemukan!</div>
    
    <button class="btn-login" onclick="prosesLogin()">Masuk Sekarang</button>
    
    <hr>
    
    <p style="font-size: 13px; color: #666; margin-bottom: 5px;">Belum punya akun?</p>
    <a href="profile.html" class="btn-register">Daftar Anggota Baru</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    function prosesLogin() {
        const ktpInput = document.getElementById("loginKtp").value;
        const errorMsg = document.getElementById("errorMessage");

        if (ktpInput === "") {
            alert("Silakan masukkan nomor KTP!");
            return;
        }

        // Mencari user di Firestore berdasarkan nomor KTP
        db.collection("users").where("no_ktp", "==", ktpInput).get()
        .then((querySnapshot) => {
            if (!querySnapshot.empty) {
                alert("Selamat Datang!");
                window.location.href = "main.menu.html"; 
            } else {
                errorMsg.style.display = "block";
            }
        })
        .catch((error) => {
            console.error("Error login: ", error);
            alert("Terjadi kesalahan koneksi.");
        });
    }
</script>

</body>
</html>
