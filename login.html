<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        /* Pengaturan Dasar agar tidak over-scroll */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .card { 
            background: white; 
            padding: 15px 20px; /* Diperkecil dari 25px */
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 320px; 
            text-align: center; 
            box-sizing: border-box;
        }

        /* Mengecilkan Logo agar hemat ruang */
        img.logo { width: 70px; margin-bottom: 5px; } 
        
        h2 { color: #333; margin: 5px 0 0 0; font-size: 18px; }
        p.subtitle { color: #666; font-size: 12px; margin: 0 0 15px 0; }
        
        /* Input lebih ramping */
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 5px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fafafa; 
        }
        
        .btn-masuk { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px; 
            margin-top: 10px; 
            transition: 0.3s; 
        }

        .footer-link { margin-top: 12px; font-size: 12px; color: #666; }
        
        /* Tombol Admin dibuat lebih simpel agar tidak makan tempat */
        .btn-admin { 
            background: none; 
            border: none; 
            color: #bbb; 
            font-size: 10px; 
            margin-top: 15px; 
            cursor: pointer; 
            text-decoration: underline; 
            display: block;
            width: 100%;
        }

        #loading { display: none; margin-top: 5px; color: #007bff; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h2>Selamat Datang</h2>
    <p class="subtitle">Login ke Akun Anda</p>
    
    <input type="email" id="email" placeholder="Email Terdaftar">
    <input type="password" id="pass" placeholder="Password">
    
    <div id="loading">Memeriksa Database...</div>
    <button class="btn-masuk" onclick="cekLogin()">MASUK</button>

    <div class="footer-link">
        Belum punya akun? <a href="index.html">Daftar</a>
    </div>

    <button class="btn-admin" onclick="loginAdmin()">Administrator</button>
</div>

<script>
    function loginAdmin() {
        const p = prompt("Masukkan Password Master Admin:");
        if (p === "admin2026") {
            window.location.href = "admin_portal.html";
        } else if (p !== null) {
            alert("Password Salah!");
        }
    }

    async function cekLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const loader = document.getElementById('loading');
        const btn = document.querySelector('.btn-masuk');

        if (!email || !pass) {
            alert("Isi Email dan Password!");
            return;
        }

        if (email === "admin@pondok.com" && pass === "admin2026") {
            window.location.href = "admin_portal.html";
            return;
        }

        loader.style.display = "block";
        btn.disabled = true;
        
        const urlServer = "https://script.google.com/macros/s/AKfycbykw5ra1tq4mJ5JQZm-uumsZLnTnpdcCOGGPa_GlTWK5Xqt0U51pa2aytduIE3Y-VSeIA/exec";

        try {
            const response = await fetch(`${urlServer}?action=login&email=${email}&pass=${pass}`);
            const result = await response.json();

            if (result.status === "Aktif") {
                window.location.href = "main_menu.html";
            } else if (result.status === "Pending") {
                alert("Akun belum AKTIF. Cek email aktivasi!");
            } else if (result.status === "Nonaktif") {
                alert("Akun dinonaktifkan Admin.");
            } else {
                alert("Email/Password salah!");
            }
        } catch (err) {
            alert("Gagal koneksi.");
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
