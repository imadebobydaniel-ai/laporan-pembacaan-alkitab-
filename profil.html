<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Saya - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigasi di navbar dimatikan sesuai perintah sebelumnya */
        .navbar { background: #007bff; color: white; padding: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .container { padding: 20px; flex: 1; text-align: center; }
        .profile-header { margin-bottom: 25px; }
        
        /* Container untuk foto */
        .profile-pic-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
        }

        .profile-pic { width: 100%; height: 100%; background: #ddd; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .profile-pic i { font-size: 50px; color: #666; }
        
        /* PERINTAH: Menghilangkan simbol pensil edit foto */
        .edit-pic-icon { display: none; }

        .info-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: left; }
        .info-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .info-item:last-child { border-bottom: none; }
        .info-label { font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 14px; color: #333; font-weight: bold; }
        
        /* PERINTAH: Menghilangkan tombol "Edit Profil / Pengaturan" di bawah info-card */
        .btn-edit { display: none; }
        
        .footer-padding { background: #007bff; height: 50px; width: 100%; margin-top: auto; }
        
        /* Input file dan fungsionalitas upload dimatikan */
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: bold;">Profil Saya</div>
</div>

<div class="container">
    <div class="profile-header">
        <div class="profile-pic-container">
            <div class="profile-pic">
                <i class="fa-solid fa-user" id="defaultIcon"></i>
                <img id="imagePreview" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            </div>
            </div>
        <h2 id="dispName" style="margin: 5px 0; font-size: 18px;">Memuat...</h2>
        <p id="dispRole" style="margin: 0; color: #666; font-size: 13px;">Anggota Komsel</p>
    </div>

    <div class="info-card">
        <div class="info-item">
            <span class="info-label">Email</span>
            <span class="info-value" id="dispEmail">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Nomor Komsel</span>
            <span class="info-value" id="dispJC">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Lokasi Ibadah</span>
            <span class="info-value" id="dispLoc">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Status</span>
            <span class="info-value" style="color: #28a745;">Aktif</span>
        </div>
    </div>

    </div>

<a href="main_menu.html" style="display: block; text-align: center; margin: 15px auto; text-decoration: none; color: #007bff; font-weight: bold; font-size: 14px;">
    <i class="fa-solid fa-arrow-left"></i> Kembali ke Menu
</a>

<div class="footer-padding"></div>

<script>
    function loadProfileData() {
        const nama = localStorage.getItem('nama_login') || "Pengguna";
        const email = localStorage.getItem('email_login') || "anggota@pondok.com";
        const jc = localStorage.getItem('jc_login') || "-";
        const lokasi = localStorage.getItem('lokasi_ibadah') || "Belum diatur";

        document.getElementById('dispName').innerText = nama;
        document.getElementById('dispEmail').innerText = email;
        document.getElementById('dispJC').innerText = "JC " + jc;
        document.getElementById('dispLoc').innerText = lokasi;
    }

    // Logika upload foto dimatikan

    window.onload = loadProfileData;
</script>

</body>
</html>
