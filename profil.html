<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Manual Score</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .profile-card { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .header-blue { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; }

        /* Animasi Scoring Lingkaran */
        .photo-container { position: relative; width: 150px; height: 150px; margin: 30px auto 10px; display: flex; align-items: center; justify-content: center; }
        .progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
        .progress-ring__circle { stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 1s ease-in-out; stroke: var(--primary); stroke-width: 8; fill: transparent; stroke-linecap: round; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; background: #eee; position: relative; z-index: 2; border: 4px solid white; }

        .score-badge { position: absolute; bottom: 0; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 3; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .info-container { padding: 20px; }
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .input-group label { display: block; font-size: 10px; color: #888; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; border: none; outline: none; font-size: 14px; font-weight: 600; color: var(--text); background: transparent; }
        
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.9; transform: scale(0.98); }
        .btn-back { display: block; text-align: center; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: bold; margin-top: 20px; }
        
        /* Edit Icon */
        .edit-hint { font-size: 11px; color: #aaa; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="header-blue">Biodata & Kelengkapan Profil</div>
    
    <div class="photo-container">
        <svg class="progress-ring" width="150" height="150">
            <circle class="progress-ring__circle" id="circle" r="70" cx="75" cy="75"/>
        </svg>
        <img src="https://via.placeholder.com/120" id="displayPhoto" class="profile-img" onclick="document.getElementById('fileInput').click();">
        <div class="score-badge" id="scoreText">0%</div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
    <div class="edit-hint">Klik foto untuk ganti, isi data di bawah</div>

    <div class="info-container">
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="in_nama" placeholder="Masukkan Nama" oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Jabatan / Peran</label>
            <input type="text" id="in_jabatan" placeholder="Contoh: Anggota JC" oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Email Aktif</label>
            <input type="email" id="in_email" placeholder="nama@email.com" oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Nomor HP (WhatsApp)</label>
            <input type="number" id="in_hp" placeholder="0812..." oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Lokasi Komsel JC</label>
            <input type="text" id="in_jc" placeholder="Nama Lokasi" oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Golongan Darah</label>
            <select id="in_goldar" onchange="hitungSkor()">
                <option value="">Pilih</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <button class="btn-save" onclick="simpanData()"><i class="fas fa-save"></i> SIMPAN PROFIL</button>
        <a href="main_menu.html" class="btn-back">← Kembali ke Menu Utama</a>
    </div>
</div>

<script>
    // Fungsi Hitung Skor (Persentase)
    function hitungSkor() {
        const fields = ['in_nama', 'in_jabatan', 'in_email', 'in_hp', 'in_jc', 'in_goldar'];
        let terisi = 0;
        
        fields.forEach(id => {
            if (document.getElementById(id).value.trim() !== "") {
                terisi++;
            }
        });

        const persen = Math.round((terisi / fields.length) * 100);
        updateAnimasi(persen);
    }

    // Fungsi Animasi Lingkaran
    function updateAnimasi(percent) {
        const circle = document.getElementById('circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        const offset = circumference - (percent / 100 * circumference);
        circle.style.strokeDashoffset = offset;
        
        document.getElementById('scoreText').innerText = percent + "%";
        
        // Ubah warna jika sudah 100%
        if(percent === 100) {
            circle.style.stroke = "#28a745";
        } else {
            circle.style.stroke = "#007bff";
        }
    }

    // Simpan ke Memori Browser (Local Storage)
    function simpanData() {
        const profil = {
            nama: document.getElementById('in_nama').value,
            jabatan: document.getElementById('in_jabatan').value,
            email: document.getElementById('in_email').value,
            hp: document.getElementById('in_hp').value,
            jc: document.getElementById('in_jc').value,
            goldar: document.getElementById('in_goldar').value,
            foto: document.getElementById('displayPhoto').src
        };
        
        localStorage.setItem('user_profil_manual', JSON.stringify(profil));
        alert("Profil Berhasil Disimpan Lokal!");
    }

    // Muat data saat halaman dibuka
    window.onload = () => {
        const saved = localStorage.getItem('user_profil_manual');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('in_nama').value = data.nama || "";
            document.getElementById('in_jabatan').value = data.jabatan || "";
            document.getElementById('in_email').value = data.email || "";
            document.getElementById('in_hp').value = data.hp || "";
            document.getElementById('in_jc').value = data.jc || "";
            document.getElementById('in_goldar').value = data.goldar || "";
            if(data.foto) document.getElementById('displayPhoto').src = data.foto;
        }
        hitungSkor();
    };

    // Fungsi Handle Foto
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('displayPhoto').src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
