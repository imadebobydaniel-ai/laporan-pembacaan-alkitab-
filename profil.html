<div class="profile-card">
    <div class="header-blue">Profil Saya</div>
    
    <div class="photo-section">
        <img src="https://via.placeholder.com/100" id="displayPhoto" class="profile-img" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #eee;">
        
        <label for="fileInput" class="btn-upload" style="position: absolute; bottom: 25px; right: 38%; background: #007bff; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white;">
            <i class="fa-solid fa-pencil"></i>
        </label>
        
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <h3 id="p_nama" style="margin: 10px 0 5px;">Memuat Nama...</h3>
        <p id="p_jabatan" style="color: #666; font-size: 13px; margin: 0;">Memuat Jabatan...</p>
    </div>

    <div class="info-container" style="padding: 0 20px 20px;">
        <div class="info-item" style="border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between;">
            <span class="label" style="color: #888; font-size: 12px; text-transform: uppercase;">Email</span>
            <span class="value" id="p_email" style="font-weight: 600; font-size: 14px;">-</span>
        </div>
        <div class="info-item" style="border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between;">
            <span class="label" style="color: #888; font-size: 12px; text-transform: uppercase;">Nomor HP</span>
            <span class="value" id="p_hp" style="font-weight: 600; font-size: 14px;">-</span>
        </div>
        <div class="info-item" style="border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between;">
            <span class="label" style="color: #888; font-size: 12px; text-transform: uppercase;">Lokasi JC</span>
            <span class="value" id="p_jc" style="font-weight: 600; font-size: 14px;">-</span>
        </div>
        <div class="info-item" style="border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between;">
            <span class="label" style="color: #888; font-size: 12px; text-transform: uppercase;">Gol. Darah</span>
            <span class="value" id="p_goldar" style="font-weight: 600; font-size: 14px;">-</span>
        </div>
        <div class="info-item" style="border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between;">
            <span class="label" style="color: #888; font-size: 12px; text-transform: uppercase;">Status</span>
            <span class="value" style="color: #28a745; font-weight: bold; font-size: 14px;">Aktif</span>
        </div>
    </div>

    <a href="main_menu.html" style="display: block; width: 90%; margin: 10px auto 20px; padding: 12px; text-align: center; border: 2px solid #007bff; color: #007bff; text-decoration: none; border-radius: 8px; font-weight: bold;">← Kembali ke Menu</a>
</div>

<script>
    // FUNGSI 1: AMBIL DATA DARI DATABASE LOKAL (BIODATA LENGKAP)
    function muatDataProfil() {
        // Ambil data user yang sedang login
        const dataUser = JSON.parse(localStorage.getItem('userSession')); 
        
        if (dataUser) {
            document.getElementById('p_nama').innerText = dataUser.nama || "User";
            document.getElementById('p_email').innerText = dataUser.email || "-";
            document.getElementById('p_jabatan').innerText = dataUser.jabatan || "Anggota";
            document.getElementById('p_hp').innerText = dataUser.hp || "-";
            document.getElementById('p_jc').innerText = dataUser.jc || "-";
            document.getElementById('p_goldar').innerText = dataUser.goldar || "-";
        }

        // Ambil Foto Profil
        const fotoTersimpan = localStorage.getItem('userPhoto');
        if (fotoTersimpan) {
            document.getElementById('displayPhoto').src = fotoTersimpan;
        }
    }

    // FUNGSI 2: UPLOAD FOTO PROFIL (BIAR BISA DI HP)
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const fotoBase64 = event.target.result;
                document.getElementById('displayPhoto').src = fotoBase64;
                localStorage.setItem('userPhoto', fotoBase64); // Simpan permanen di HP
            };
            reader.readAsDataURL(file);
        }
    });

    // Jalankan saat halaman dibuka
    window.onload = muatDataProfil;
</script>
