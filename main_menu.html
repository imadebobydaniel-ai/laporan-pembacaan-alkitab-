<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            overflow-x: hidden;
            overscroll-behavior-y: contain; /* Membantu kontrol refresh pada browser mobile */
        }
        
        .navbar { 
            background: #007bff; 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: 50px;
            gap: 10px;
        }

        .btn-setting {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        
        .btn-logout { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
        }

        .container { 
            padding: 15px; 
            max-width: 100%; 
            margin: auto; 
            text-align: center; 
            box-sizing: border-box;
        }

        .main-title {
            font-weight: bold; 
            font-size: 20px;
            color: #333;
            margin: 10px 0;
        }

        .welcome-card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }

        .welcome-card h2 { font-size: 16px; margin: 0; }
        .welcome-card p { font-size: 12px; margin: 5px 0 0 0; color: #666; }
        
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
        }

        .menu-item { 
            background: white; 
            padding: 15px 5px; 
            border-radius: 12px; 
            text-align: center; 
            text-decoration: none; 
            color: #333; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        
        .menu-item i { font-size: 24px; margin-bottom: 8px; color: #007bff; }
        .menu-item h3 { margin: 0; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="navbar">
    <button class="btn-setting" onclick="location.href='setting.html'"><i class="fa-solid fa-gear"></i></button>
    <button class="btn-logout" onclick="location.href='index.html'">Keluar</button>
</div>

<div class="container">
    <div class="main-title">Pondok Pemulihan Papua</div>

    <div class="welcome-card">
        <h2 id="userGreeting">Selamat Datang Imade Boby Komsel JC 5</h2>
        <p>Sistem Informasi Komsel JC</p>
    </div>

    <div class="menu-grid">
        <a href="profil.html" class="menu-item">
            <i class="fa-solid fa-user-gear"></i>
            <h3>Profil Saya</h3>
        </a>
        <a href="kehadiran.html" class="menu-item">
            <i class="fa-solid fa-calendar-check"></i>
            <h3>Kehadiran</h3>
        </a>
        <a href="alkitab.html" class="menu-item">
            <i class="fa-solid fa-book-bible"></i>
            <h3>Baca Alkitab</h3>
        </a>
        <a href="statistik.html" class="menu-item">
            <i class="fa-solid fa-chart-line"></i>
            <h3>Statistik Komsel</h3>
        </a>
        <a href="kegiatan.html" class="menu-item">
            <i class="fa-solid fa-calendar-days"></i>
            <h3>Kegiatan Tahunan</h3>
        </a>
        <a href="laporan.html" class="menu-item">
            <i class="fa-solid fa-file-invoice"></i>
            <h3>Laporan Bulanan</h3>
        </a>
        <a href="lacak.html" class="menu-item">
            <i class="fa-solid fa-location-dot"></i>
            <h3>Lacak Domba</h3>
        </a>
    </div>
</div>

<script>
    // Fitur Swipe to Refresh yang diperbaiki
    let startY = 0;
    
    window.addEventListener('touchstart', (e) => {
        startY = e.touches[0].pageY;
    }, {passive: true});

    window.addEventListener('touchmove', (e) => {
        const currentY = e.touches[0].pageY;
        const diff = currentY - startY;

        // Jika swipe ke bawah lebih dari 100px dan user berada di top halaman
        if (diff > 100 && window.scrollY === 0) {
            location.reload();
        }
    }, {passive: true});
</script>

</body>
</html>
