<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 80px; }
        .header h2 { margin: 10px 0 5px 0; color: #333; }
        
        .menu-container { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 350px; }
        
        .menu-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; cursor: pointer; transition: 0.3s; border-left: 5px solid #28a745; }
        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .icon { font-size: 30px; margin-right: 20px; }
        .menu-info h3 { margin: 0; font-size: 16px; color: #333; }
        .menu-info p { margin: 5px 0 0 0; font-size: 12px; color: #777; }

        /* Khusus tombol Admin/PKS */
        #btn-export { border-left-color: #ffd700; display: none; } /* Tersembunyi default */
    </style>
</head>
<body>

<div class="header">
    <img src="logo_pondok.png" alt="Logo">
    <h2>Main Menu</h2>
    <p id="user-info" style="color: #28a745; font-weight: bold;"></p>
</div>

<div class="menu-container">
    <div class="menu-card" onclick="alert('Menu Laporan Alkitab sedang disiapkan...')">
        <div class="icon">📖</div>
        <div class="menu-info">
            <h3>Laporan Baca Alkitab</h3>
            <p>Input progres pembacaan harian</p>
        </div>
    </div>

    <div class="menu-card" onclick="alert('Menu Kehadiran Komsel sedang disiapkan...')">
        <div class="icon">📍</div>
        <div class="menu-info">
            <h3>Presensi Komsel</h3>
            <p>Lapor kehadiran mandiri anggota</p>
        </div>
    </div>

    <div id="btn-export" class="menu-card" onclick="alert('Menu Export PDF sedang disiapkan...')">
        <div class="icon">📊</div>
        <div class="menu-info">
            <h3>Extract Laporan</h3>
            <p>Export data ke PDF & Statistik (PKS Only)</p>
        </div>
    </div>
</div>

<button onclick="window.location.href='index.html'" style="margin-top: 30px; padding: 10px 20px; border-radius: 8px; border: none; background: #666; color: white;">Keluar</button>

<script>
    // Sementara kita gunakan simulasi, nanti akan dihubungkan dengan data login asli
    // Contoh: Jika jabatan adalah Ketua PKS, tampilkan menu export
    const userJabatan = "Ketua PKS"; // Ini nanti diambil dari database

    if (userJabatan === "Ketua PKS") {
        document.getElementById('btn-export').style.display = 'flex';
    }
</script>

</body>
</html>
