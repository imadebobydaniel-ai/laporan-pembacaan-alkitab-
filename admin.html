<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; 
            --accent: #007bff; 
            --dark: #333; 
            --light: #f4f7f6; 
            --success: #28a745; 
            --emas: #D4AF37;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1300px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Header */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        /* Search */
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        /* Table */
        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; white-space: nowrap; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: middle; }
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }

        /* Form Grid */
        .admin-grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-card h3 { color: var(--primary); margin: 0 0 15px; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }

        /* Desain Khusus Portal Media Baru */
        .media-management-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-top: 20px; }
        .playlist-container { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 15px; max-height: 500px; overflow-y: auto; }
        .media-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; gap: 10px; transition: 0.2s; }
        .media-item:hover { background: #f8f9fa; }
        .media-info { flex: 1; }
        .media-info h4 { margin: 0; font-size: 13px; color: var(--primary); }
        .media-info span { font-size: 10px; color: #888; text-transform: uppercase; }
        .media-controls { display: flex; gap: 5px; }
        .btn-control { border: none; background: #eee; color: #555; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-control:hover { background: var(--accent); color: white; }
        .btn-delete-media { color: #dc3545; }

        .play-modes { display: flex; justify-content: space-around; background: #f1f3f5; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .mode-btn { background: none; border: none; cursor: pointer; color: #aaa; font-size: 14px; transition: 0.3s; }
        .mode-btn.active { color: var(--accent); font-weight: bold; }

        /* Modal Edit */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #aaa; }
        .section-divider { background: #f8f9fa; padding: 10px; border-radius: 8px; margin: 15px 0; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2>Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama, email, atau alamat anggota...">
        <i class="fas fa-search"></i>
    </div>

    <div class="table-responsive">
        <table id="adminTable">
            <thead>
                <tr>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>NK</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Alamat</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <div class="admin-grid-forms">
        <div class="admin-card">
            <h3><i class="fas fa-bullhorn"></i> Kirim Informasi</h3>
            <form id="formInfo">
                <div class="form-group"><label>Judul</label><input type="text" id="info_judul" required></div>
                <div class="form-group"><label>Pesan</label><textarea id="info_pesan" rows="3" required></textarea></div>
                <button type="submit" class="btn-save">PUBLIKASIKAN</button>
            </form>
        </div>
    </div>

    <div class="media-management-grid">
        <div class="admin-card">
            <h3><i class="fas fa-plus-circle"></i> Tambah Media Baru</h3>
            <form id="formAddMedia">
                <div class="form-group">
                    <label>Judul Media / Konten</label>
                    <input type="text" id="m_judul" placeholder="Contoh: Khotbah Minggu" required>
                </div>
                <div class="form-group">
                    <label>Tipe Konten</label>
                    <select id="m_tipe">
                        <option value="video">Video YouTube (Link)</option>
                        <option value="gambar">Gambar (Link URL)</option>
                        <option value="teks">Pesan Teks / Pengumuman</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL Link / Isi Teks</label>
                    <textarea id="m_isi" rows="3" placeholder="Masukkan link atau pesan..." required></textarea>
                </div>
                <button type="submit" class="btn-save" style="background: #e67e22;">TAMBAHKAN KE PLAYLIST</button>
            </form>
        </div>

        <div class="playlist-container">
            <h3><i class="fas fa-list-ul"></i> Playlist & Urutan Tampil</h3>
            <div class="play-modes" id="playModes">
                <button class="mode-btn active" onclick="setMode('repeat')" id="m_repeat" title="Repeat All">
                    <i class="fas fa-redo"></i> Repeat
                </button>
                <button class="mode-btn" onclick="setMode('shuffle')" id="m_shuffle" title="Shuffle Play">
                    <i class="fas fa-random"></i> Shuffle
                </button>
                <button class="mode-btn" onclick="setMode('single')" id="m_single" title="Play Single">
                    <i class="fas fa-minus"></i> Single
                </button>
            </div>
            <div id="playlistData"></div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <h3 style="margin-top:0;"><i class="fas fa-user-edit"></i> Edit Profil & Akun</h3>
        <form id="formUpdate">
            <input type="hidden" id="edit_id">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="edit_nama" required></div>
            <div class="form-group"><label>Nomor WhatsApp</label><input type="text" id="edit_wa" required></div>
            <div class="section-divider"><p style="margin:0; font-size:11px; font-weight:bold; color:var(--accent);">KREDENSIAL LOGIN</p></div>
            <div class="form-group"><label>Email (Username)</label><input type="email" id="edit_email" required></div>
            <div class="form-group"><label>Password Baru (Kosongkan jika tidak diganti)</label><input type="text" id="edit_password"></div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1;">
                    <label>Gol. Darah</label>
                    <select id="edit_goldar">
                        <option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                    </select>
                </div>
                <div class="form-group" style="flex:2;">
                    <label>Jabatan</label>
                    <select id="edit_jabatan">
                        <option value="Anggota">Anggota</option><option value="Ketua Komsel">Ketua Komsel</option><option value="Pengurus">Pengurus</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Alamat Lengkap</label><textarea id="edit_alamat" rows="2"></textarea></div>
            <button type="submit" class="btn-save">SIMPAN PERUBAHAN</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() {
        loadUsers();
        loadPlaylist();
        loadCurrentMode();
    };

    // --- MANAJEMEN USER ---
    function loadUsers() {
        db.collection("users").onSnapshot((snapshot) => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr>
                        <td class="freeze-col"><b>${data.nama || '-'}</b></td>
                        <td>${data.nomor_komsel || '-'}</td>
                        <td>${data.whatsapp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td style="text-align:center">${data.golongan_darah || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td>${data.alamat || '-'}</td>
                        <td>
                            <i class="fas fa-edit" style="color:blue;cursor:pointer" onclick="openEditModal('${doc.id}')"></i>
                            <i class="fas fa-trash" style="color:red;cursor:pointer;margin-left:12px" onclick="deleteMember('${doc.id}')"></i>
                        </td>
                    </tr>`;
            });
        });
    }

    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        const data = doc.data();
        document.getElementById("edit_id").value = id;
        document.getElementById("edit_nama").value = data.nama || "";
        document.getElementById("edit_wa").value = data.whatsapp || "";
        document.getElementById("edit_email").value = data.email || "";
        document.getElementById("edit_goldar").value = data.golongan_darah || "-";
        document.getElementById("edit_jabatan").value = data.jabatan || "Anggota";
        document.getElementById("edit_alamat").value = data.alamat || "";
        document.getElementById("editModal").style.display = "block";
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }

    document.getElementById("formUpdate").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("edit_id").value;
        const pass = document.getElementById("edit_password").value;
        const updateData = {
            nama: document.getElementById("edit_nama").value,
            whatsapp: document.getElementById("edit_wa").value,
            email: document.getElementById("edit_email").value,
            golongan_darah: document.getElementById("edit_goldar").value,
            jabatan: document.getElementById("edit_jabatan").value,
            alamat: document.getElementById("edit_alamat").value
        };
        if (pass.trim() !== "") { updateData.password = pass; }
        await db.collection("users").doc(id).update(updateData);
        alert("Data diperbarui!");
        closeEditModal();
    };

    // --- MANAJEMEN PORTAL MEDIA ---
    document.getElementById("formAddMedia").onsubmit = async (e) => {
        e.preventDefault();
        const snapshot = await db.collection("portal_media").orderBy("urutan", "desc").limit(1).get();
        let lastOrder = 0;
        snapshot.forEach(doc => { lastOrder = doc.data().urutan });
        const data = {
            judul: document.getElementById("m_judul").value,
            tipe: document.getElementById("m_tipe").value,
            isi: document.getElementById("m_isi").value,
            urutan: lastOrder + 1,
            created_at: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection("portal_media").add(data);
        document.getElementById("formAddMedia").reset();
    };

    function loadPlaylist() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot((snapshot) => {
            const container = document.getElementById("playlistData");
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const m = doc.data();
                container.innerHTML += `
                    <div class="media-item">
                        <div class="media-info">
                            <span>${m.tipe}</span>
                            <h4>${m.judul}</h4>
                        </div>
                        <div class="media-controls">
                            <button class="btn-control" onclick="moveUp('${doc.id}', ${m.urutan})"><i class="fas fa-arrow-up"></i></button>
                            <button class="btn-control" onclick="moveDown('${doc.id}', ${m.urutan})"><i class="fas fa-arrow-down"></i></button>
                            <button class="btn-control btn-delete-media" onclick="deleteMedia('${doc.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });
    }

    async function moveUp(id, current) {
        const prev = await db.collection("portal_media").where("urutan", "<", current).orderBy("urutan", "desc").limit(1).get();
        if(!prev.empty) {
            const prevDoc = prev.docs[0];
            await db.collection("portal_media").doc(id).update({ urutan: prevDoc.data().urutan });
            await db.collection("portal_media").doc(prevDoc.id).update({ urutan: current });
        }
    }

    async function moveDown(id, current) {
        const next = await db.collection("portal_media").where("urutan", ">", current).orderBy("urutan", "asc").limit(1).get();
        if(!next.empty) {
            const nextDoc = next.docs[0];
            await db.collection("portal_media").doc(id).update({ urutan: nextDoc.data().urutan });
            await db.collection("portal_media").doc(nextDoc.id).update({ urutan: current });
        }
    }

    async function setMode(mode) {
        await db.collection("settings").doc("media_config").set({ play_mode: mode }, { merge: true });
        updateModeUI(mode);
    }

    function loadCurrentMode() {
        db.collection("settings").doc("media_config").onSnapshot(doc => {
            if(doc.exists) updateModeUI(doc.data().play_mode);
        });
    }

    function updateModeUI(mode) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('m_' + mode)) document.getElementById('m_' + mode).classList.add('active');
    }

    function deleteMedia(id) { if(confirm("Hapus media?")) db.collection("portal_media").doc(id).delete(); }
    function deleteMember(id) { if(confirm("Hapus anggota?")) db.collection("users").doc(id).delete(); }
    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
