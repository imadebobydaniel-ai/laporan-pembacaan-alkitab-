<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; 
            --accent: #007bff; 
            --dark: #333; 
            --light: #f4f7f6; 
            --success: #28a745; 
            --emas: #D4AF37;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }

        .admin-container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h2 { font-size: 1.2rem; margin: 0; color: var(--primary); }

        .btn-logout { background: #dc3545; color: white; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .search-box { position: relative; margin-bottom: 15px; width: 100%; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        /* TABEL RESPONSIVE */
        .table-responsive { 
            overflow-x: auto; 
            border-radius: 10px; 
            border: 1px solid #eee; 
            -webkit-overflow-scrolling: touch;
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; white-space: nowrap; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 12px; color: var(--dark); white-space: nowrap; }

        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }
        th.freeze-col { z-index: 3; background: var(--primary) !important; color: white; }

        .action-icons { display: flex; gap: 12px; font-size: 16px; }
        .btn-edit { color: var(--accent); cursor: pointer; }
        .btn-delete { color: #dc3545; cursor: pointer; }

        /* GRID UNTUK MENU INPUT DIBAWAH */
        .admin-grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-card h3 { color: var(--primary); margin-top: 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }

        /* MODAL & FORM STYLING */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 30px auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; position: relative; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 13px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.9; }
        .readonly-field { background: #f9f9f9; color: #888; }
        .close-modal { position: absolute; right: 15px; top: 15px; font-size: 24px; cursor: pointer; color: #999; }

        #loading-state { text-align: center; padding: 20px; color: var(--primary); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h2>Dashboard Admin</h2>
            <p style="margin:2px 0 0; color:#777; font-size: 11px;">Manajemen Anggota & Konten PPP</p>
        </div>
        <a href="login_admin.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari Nama, NK, atau Email...">
        <i class="fas fa-search"></i>
    </div>

    <div id="loading-state"><i class="fas fa-spinner fa-spin"></i> Memuat Data Anggota...</div>

    <div class="table-responsive">
        <table id="adminTable" style="display:none;">
            <thead>
                <tr>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>NK</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <div class="admin-grid-forms">
        
        <div class="admin-card">
            <h3><i class="fas fa-bullhorn"></i> Input Informasi</h3>
            <form id="formInfo">
                <div class="form-group">
                    <label>Judul Informasi</label>
                    <input type="text" id="info_judul" placeholder="Contoh: Pengumuman Ibadah" required>
                </div>
                <div class="form-group">
                    <label>Isi Pesan</label>
                    <textarea id="info_pesan" rows="3" placeholder="Tulis rincian pengumuman..." required></textarea>
                </div>
                <button type="submit" class="btn-save" style="background: var(--primary);">KIRIM INFORMASI</button>
            </form>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-play-circle"></i> Portal Media (YouTube)</h3>
            <form id="formMedia">
                <div class="form-group">
                    <label>Judul Media</label>
                    <input type="text" id="media_judul" placeholder="Judul Video" required>
                </div>
                <div class="form-group">
                    <label>URL Embed YouTube</label>
                    <input type="text" id="media_url" placeholder="https://www.youtube.com/embed/..." required>
                </div>
                <div class="form-group">
                    <label>Urutan</label>
                    <input type="number" id="media_urutan" value="1">
                </div>
                <button type="submit" class="btn-save" style="background: #e67e22;">UPDATE MEDIA</button>
            </form>
        </div>

        <div class="admin-card" style="display: flex; flex-direction: column; gap: 10px;">
            <h3><i class="fas fa-tools"></i> Navigasi Cepat</h3>
            <a href="statistik_global.html" class="btn-save" style="text-align: center; text-decoration: none; background: #6c757d;">
                <i class="fas fa-chart-line"></i> STATISTIK GLOBAL
            </a>
            <a href="rekap_absen.html" class="btn-save" style="text-align: center; text-decoration: none; background: #2c3e50;">
                <i class="fas fa-user-check"></i> REKAP ABSENSI
            </a>
            <button onclick="resetAbsenHarian()" class="btn-save" style="background: #c0392b;">
                <i class="fas fa-sync-alt"></i> RESET ABSEN HARIAN
            </button>
        </div>

    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <h3 style="margin: 0 0 15px; color: var(--primary);">Edit Data Anggota</h3>
        <form id="formUpdate">
            <input type="hidden" id="edit_id">
            <div class="form-group">
                <label>Nomor Komsel (NK)</label>
                <input type="text" id="edit_nk" class="readonly-field" readonly>
            </div>
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="edit_nama" required></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="edit_wa" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="edit_email" required></div>
            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="edit_goldarah">
                    <option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jabatan</label>
                <select id="edit_jabatan">
                    <option value="Ketua Komsel">Ketua Komsel</option><option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option><option value="Anggota Komsel">Anggota Komsel</option><option value="Anggota">Anggota</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lokasi JC</label>
                <select id="edit_jc">
                    <option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option><option value="4">JC 4</option><option value="5">JC 5</option>
                </select>
            </div>
            <button type="submit" class="btn-save">SIMPAN PERUBAHAN</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // 1. LOAD DATA ANGGOTA (REAL-TIME)
    async function loadData() {
        const tableBody = document.getElementById("memberData");
        try {
            db.collection("users").onSnapshot((snapshot) => {
                tableBody.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    tableBody.innerHTML += `
                        <tr>
                            <td class="freeze-col"><b>${data.nama || '-'}</b></td>
                            <td>${data.nomor_komsel || '-'}</td>
                            <td>${data.whatsapp || '-'}</td>
                            <td>${data.email || '-'}</td>
                            <td>${data.golDarah || '-'}</td>
                            <td>${data.jabatan || '-'}</td>
                            <td>JC ${data.komsel || '-'}</td>
                            <td><span style="color:green">●</span> ${data.status || 'Aktif'}</td>
                            <td class="action-icons">
                                <i class="fas fa-edit btn-edit" onclick="openEditModal('${doc.id}')"></i>
                                <i class="fas fa-trash btn-delete" onclick="deleteMember('${doc.id}', '${data.nama}')"></i>
                            </td>
                        </tr>`;
                });
                document.getElementById("loading-state").style.display = "none";
                document.getElementById("adminTable").style.display = "table";
            });
        } catch (e) { console.error(e); }
    }

    // 2. INPUT INFORMASI KE FIREBASE
    document.getElementById("formInfo").onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection("pengumuman_komsel").add({
                judul: document.getElementById("info_judul").value,
                isi: document.getElementById("info_pesan").value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Informasi berhasil dikirim!");
            e.target.reset();
        } catch (err) { alert("Gagal: " + err.message); }
    };

    // 3. INPUT PORTAL MEDIA KE FIREBASE
    document.getElementById("formMedia").onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection("portal_media").add({
                judul: document.getElementById("media_judul").value,
                url: document.getElementById("media_url").value,
                urutan: parseInt(document.getElementById("media_urutan").value),
                tipe: "video_youtube",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Portal media diperbarui!");
            e.target.reset();
        } catch (err) { alert("Gagal: " + err.message); }
    };

    // 4. LOGIKA EDIT & HAPUS ANGGOTA
    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById("edit_id").value = id;
            document.getElementById("edit_nk").value = data.nomor_komsel || "";
            document.getElementById("edit_nama").value = data.nama || "";
            document.getElementById("edit_wa").value = data.whatsapp || "";
            document.getElementById("edit_email").value = data.email || "";
            document.getElementById("edit_goldarah").value = data.golDarah || "-";
            document.getElementById("edit_jabatan").value = data.jabatan || "Anggota";
            document.getElementById("edit_jc").value = data.komsel || "1";
            document.getElementById("editModal").style.display = "block";
        }
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }

    document.getElementById("formUpdate").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("edit_id").value;
        try {
            await db.collection("users").doc(id).update({
                nama: document.getElementById("edit_nama").value,
                whatsapp: document.getElementById("edit_wa").value,
                email: document.getElementById("edit_email").value,
                golDarah: document.getElementById("edit_goldarah").value,
                jabatan: document.getElementById("edit_jabatan").value,
                komsel: document.getElementById("edit_jc").value
            });
            alert("Data Anggota diperbarui!");
            closeEditModal();
        } catch (err) { alert("Gagal: " + err.message); }
    };

    async function deleteMember(id, nama) {
        if (confirm("Hapus " + nama + "?")) { await db.collection("users").doc(id).delete(); }
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#memberData tr");
        rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
    }

    function resetAbsenHarian() {
        if(confirm("Yakin ingin meriset absen hari ini?")) { alert("Fitur reset siap dikonfigurasi."); }
    }

    window.onload = loadData;
</script>
</body>
</html>
