<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; 
            --accent: #007bff; 
            --dark: #333; 
            --light: #f4f7f6; 
            --success: #28a745; 
            --emas: #D4AF37;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1300px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Table Styling */
        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 11.5px; }
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }

        /* Form Styling */
        .admin-grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-card h3 { color: var(--primary); margin: 0 0 15px; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }

        /* Modal Edit */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2>Dashboard Management Admin</h2>
        <a href="login.html" class="btn-save" style="background:#dc3545; width:auto; padding:8px 15px;">Keluar</a>
    </div>

    <div class="table-responsive">
        <table id="adminTable">
            <thead>
                <tr>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>NK</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Alamat</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData">
                </tbody>
        </table>
    </div>

    <div class="admin-grid-forms">
        <div class="admin-card">
            <h3><i class="fas fa-user-shield"></i> Keamanan Akun (Ganti Pass/Email)</h3>
            <form id="formAccount">
                <div class="form-group">
                    <label>Email Baru</label>
                    <input type="email" id="acc_email_baru" placeholder="Masukkan email baru...">
                </div>
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" id="acc_pass_baru" placeholder="Minimal 6 karakter...">
                </div>
                <p style="font-size: 10px; color: #888;">*Pastikan user sedang login untuk melakukan perubahan ini.</p>
                <button type="submit" class="btn-save" style="background: var(--accent);">UPDATE AKUN</button>
            </form>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-play-circle"></i> Portal Media</h3>
            <form id="formMedia">
                <div class="form-group"><label>Judul Konten</label><input type="text" id="media_judul" required></div>
                <div class="form-group">
                    <label>Tipe Konten</label>
                    <select id="media_tipe">
                        <option value="video_youtube">Video YouTube</option>
                        <option value="gambar">Gambar (URL)</option>
                        <option value="teks">Teks Saja</option>
                    </select>
                </div>
                <div class="form-group"><label>Isi Konten / URL</label><textarea id="media_isi" rows="2"></textarea></div>
                <div class="form-group"><label>Urutan</label><input type="number" id="media_urutan" value="1"></div>
                <button type="submit" class="btn-save" style="background: #e67e22;">UPDATE PORTAL</button>
            </form>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit Data Anggota</h3>
        <form id="formUpdate">
            <input type="hidden" id="edit_id">
            <div class="form-group"><label>Nama</label><input type="text" id="edit_nama" required></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="edit_wa" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="edit_email" required></div>
            <div class="form-group">
                <label>Gol. Darah</label>
                <select id="edit_goldar">
                    <option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jabatan</label>
                <select id="edit_jabatan">
                    <option value="Ketua Komsel">Ketua Komsel</option><option value="Anggota">Anggota</option>
                </select>
            </div>
            <div class="form-group"><label>Alamat</label><textarea id="edit_alamat"></textarea></div>
            <button type="submit" class="btn-save">SIMPAN PERUBAHAN</button>
            <button type="button" onclick="closeEditModal()" class="btn-save" style="background:#888; margin-top:5px;">BATAL</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // LOAD DATA KE TABEL
    window.onload = function() {
        db.collection("users").onSnapshot((snapshot) => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr>
                        <td class="freeze-col"><b>${data.nama || '-'}</b></td>
                        <td>${data.nomor_komsel || '-'}</td>
                        <td>${data.whatsapp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td style="text-align:center">${data.golongan_darah || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td>${data.alamat || '-'}</td>
                        <td>
                            <i class="fas fa-edit" style="color:blue;cursor:pointer" onclick="openEditModal('${doc.id}')"></i>
                            <i class="fas fa-trash" style="color:red;cursor:pointer;margin-left:10px" onclick="deleteMember('${doc.id}')"></i>
                        </td>
                    </tr>`;
            });
        });
    };

    // FUNGSI UPDATE EMAIL & PASSWORD (FUNGSI INI HARUS LOGIN)
    document.getElementById("formAccount").addEventListener("submit", async (e) => {
        e.preventDefault();
        const user = auth.currentUser;
        const newEmail = document.getElementById("acc_email_baru").value;
        const newPass = document.getElementById("acc_pass_baru").value;

        if (!user) { alert("Sesi berakhir, silakan login ulang."); return; }

        try {
            if (newEmail) {
                await user.updateEmail(newEmail);
                await db.collection("users").doc(user.uid).update({ email: newEmail });
            }
            if (newPass) {
                await user.updatePassword(newPass);
            }
            alert("Akun Keamanan Berhasil Diupdate!");
            e.target.reset();
        } catch (err) {
            alert("Gagal: " + err.message + " (Mungkin butuh login ulang untuk keamanan)");
        }
    });

    // OPEN MODAL EDIT
    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        const data = doc.data();
        document.getElementById("edit_id").value = id;
        document.getElementById("edit_nama").value = data.nama || "";
        document.getElementById("edit_wa").value = data.whatsapp || "";
        document.getElementById("edit_email").value = data.email || "";
        document.getElementById("edit_goldar").value = data.golongan_darah || "-";
        document.getElementById("edit_jabatan").value = data.jabatan || "Anggota";
        document.getElementById("edit_alamat").value = data.alamat || "";
        document.getElementById("editModal").style.display = "block";
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }

    // SIMPAN PERUBAHAN DATA ANGGOTA
    document.getElementById("formUpdate").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("edit_id").value;
        await db.collection("users").doc(id).update({
            nama: document.getElementById("edit_nama").value,
            whatsapp: document.getElementById("edit_wa").value,
            email: document.getElementById("edit_email").value,
            golongan_darah: document.getElementById("edit_goldar").value,
            jabatan: document.getElementById("edit_jabatan").value,
            alamat: document.getElementById("edit_alamat").value
        });
        alert("Data Anggota Berhasil Diperbarui!");
        closeEditModal();
    };

    async function deleteMember(id) {
        if (confirm("Hapus Anggota?")) await db.collection("users").doc(id).delete();
    }
</script>
</body>
</html>
