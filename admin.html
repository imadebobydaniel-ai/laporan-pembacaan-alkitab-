<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --dark: #333; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .admin-container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Header & Menu */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .nav-buttons { display: flex; gap: 10px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }
        
        /* Fitur Search */
        .search-box { position: relative; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        /* Tabel Data */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 14px; }
        table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: var(--dark); }
        
        /* Ikon Aksi */
        .action-icons { display: flex; gap: 15px; font-size: 18px; }
        .btn-edit { color: #28a745; cursor: pointer; transition: 0.3s; }
        .btn-delete { color: #dc3545; cursor: pointer; transition: 0.3s; }
        .btn-edit:hover, .btn-delete:hover { opacity: 0.7; }

        #loading-state { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h2 style="margin:0;">Dashboard Administrator</h2>
            <p style="margin:5px 0 0; color:#777; font-size: 13px;">Manajemen Data Anggota Pondok Pemulihan Papua</p>
        </div>
        <div class="nav-buttons">
            <a href="login_admin.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari Nama atau NK...">
        <i class="fas fa-search"></i>
    </div>

    <div id="loading-state"><i class="fas fa-spinner fa-spin"></i> Menghubungkan ke Firebase...</div>

    <div class="table-responsive">
        <table id="adminTable" style="display:none;">
            <thead>
                <tr>
                    <th>NK</th>
                    <th>Nama Anggota</th>
                    <th>WhatsApp</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // Fungsi Mengambil Data Sesuai Field Firebase Anda
    async function loadData() {
        const tableBody = document.getElementById("memberData");
        const loading = document.getElementById("loading-state");
        const table = document.getElementById("adminTable");

        try {
            const snapshot = await db.collection("users").get();
            tableBody.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td><b>${data.nomor_komsel || '-'}</b></td>
                        <td>${data.nama || 'Tanpa Nama'}</td>
                        <td>${data.no_hp || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td><span style="color:${data.status === 'Aktif' ? 'green' : 'red'}">${data.status || 'Pending'}</span></td>
                        <td class="action-icons">
                            <i class="fas fa-edit btn-edit" onclick="goToEdit('${doc.id}')" title="Edit Data"></i>
                            <i class="fas fa-trash btn-delete" onclick="deleteMember('${doc.id}', '${data.nama}')" title="Hapus Data"></i>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            loading.style.display = "none";
            table.style.display = "table";
        } catch (error) {
            loading.innerHTML = "Gagal memuat data: " + error.message;
        }
    }

    // Fungsi Search Data
    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.getElementById("memberData").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].innerText.toLowerCase();
            rows[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    // Fungsi Navigasi ke Edit (Sinkron dengan registrasi.html)
    function goToEdit(id) {
        localStorage.setItem("editMemberID", id);
        window.location.href = 'registrasi.html';
    }

    // Fungsi Hapus Data
    async function deleteMember(id, nama) {
        if (confirm("Apakah Anda yakin ingin menghapus data " + nama + "?")) {
            try {
                await db.collection("users").doc(id).delete();
                alert("Data berhasil dihapus");
                location.reload();
            } catch (error) {
                alert("Gagal menghapus: " + error.message);
            }
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
