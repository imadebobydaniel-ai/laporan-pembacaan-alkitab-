<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; margin: auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff0000; padding-bottom: 15px; margin-bottom: 25px; }
        .btn-keluar { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        thead { background: #ff0000; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        .edit-aktif { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; color: black; }
        select.edit-aktif { padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div style="font-size: 24px; font-weight: bold;"><i class="fa-solid fa-database"></i> Database Administrator</div>
        <button class="btn-keluar" id="btnKeluar"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        <input type="text" id="cariInput" class="search-input" placeholder="Cari Nama, No HP, atau Alamat...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20px;"><input type="checkbox" id="checkAll"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat</th>
                    <th>Jabatan</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="tabelBody">
                <tr>
                    <td><input type="checkbox" class="user-cb"></td>
                    <td class="bisa-edit">Boby Daniel</td>
                    <td class="bisa-edit">boby.daniel4@gmail.com</td>
                    <td class="bisa-edit" style="color:red; font-weight:bold;">Bukadong821</td>
                    <td class="bisa-edit">081283393576</td>
                    <td class="bisa-edit">Jl. tanah Hitam Abe pantai</td>
                    <td class="bisa-edit">Ketua Komsel</td>
                    <td class="darah-cell">AB</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. KELUAR
    document.getElementById('btnKeluar').onclick = function() {
        if(confirm("Yakin ingin keluar?")) window.location.href = "index.html";
    };

    // 2. EDIT (TEKS + DROPDOWN)
    document.getElementById('btnEdit').onclick = function() {
        let selected = document.querySelectorAll('.user-cb:checked');
        if (selected.length === 0) return alert("Centang datanya dulu, Bang!");

        selected.forEach(cb => {
            let tr = cb.closest('tr');
            // Edit Teks
            tr.querySelectorAll('.bisa-edit').forEach(td => {
                td.contentEditable = "true";
                td.classList.add('edit-aktif');
            });
            // Edit Dropdown Gol Darah
            let darahCell = tr.querySelector('.darah-cell');
            if (!darahCell.querySelector('select')) {
                let current = darahCell.innerText;
                let opts = ['O', 'A', 'B', 'AB', 'AB+'];
                let html = `<select class="edit-aktif">`;
                opts.forEach(o => html += `<option value="${o}" ${o==current?'selected':''}>${o}</option>`);
                darahCell.innerHTML = html + `</select>`;
            }
        });
        alert("Mode Edit Aktif!");
    };

    // 3. HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let selected = document.querySelectorAll('.user-cb:checked');
        if (selected.length === 0) return alert("Pilih data yang mau dihapus!");
        if (confirm("Hapus data terpilih?")) selected.forEach(cb => cb.closest('tr').remove());
    };

    // 4. CARI
    document.getElementById('cariInput').onkeyup = function() {
        let val = this.value.toLowerCase();
        document.querySelectorAll('#tabelBody tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    };

    // 5. CHECK ALL
    document.getElementById('checkAll').onclick = function() {
        document.querySelectorAll('.user-cb').forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
