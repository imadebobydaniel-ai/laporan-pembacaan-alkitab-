<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 14px; text-transform: uppercase; margin-top: 0; color: #333; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }
        
        /* Grid 3 Kolom untuk Nama */
        .realtime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .status-col { padding: 10px; border-radius: 12px; font-size: 11px; min-height: 100px; border: 1px solid #eee; }
        .col-hadir { background: #f0fff4; border-color: #c6f6d5; }
        .col-izin { background: #fff5f5; border-color: #fed7d7; }
        .col-alkitab { background: #ebf8ff; border-color: #bee3f8; }
        
        .status-title { font-weight: bold; margin-bottom: 8px; display: block; font-size: 12px; }
        .name-list { line-height: 1.5; color: #444; }
        .name-item { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 3px 0; }
        .reason { color: #c53030; font-style: italic; font-size: 10px; }

        .chart-container { position: relative; height: 200px; margin-bottom: 20px; }
        .btn-export { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #007bff; color: white; text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-calendar-check"></i> Periode Laporan</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
        </select>
        <p id="label-jc" style="color:#007bff; font-weight:bold; margin: 10px 0 0 0;">Memuat Laporan JC...</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-simple"></i> Performa Real-Time</h3>
        <div class="chart-container">
            <canvas id="performaChart"></canvas>
        </div>

        <div class="realtime-grid">
            <div class="status-col col-hadir">
                <span class="status-title" style="color: #2f855a;"><i class="fa-solid fa-circle-check"></i> Hadir</span>
                <div id="list-hadir" class="name-list">Memuat...</div>
            </div>
            <div class="status-col col-izin">
                <span class="status-title" style="color: #c53030;"><i class="fa-solid fa-circle-xmark"></i> Izin</span>
                <div id="list-izin" class="name-list">Memuat...</div>
            </div>
            <div class="status-col col-alkitab">
                <span class="status-title" style="color: #2b6cb0;"><i class="fa-solid fa-book-open"></i> Alkitab</span>
                <div id="list-alkitab" class="name-list">Memuat...</div>
            </div>
        </div>
    </div>

    <div class="card" style="background: #fff3cd;">
        <h3 style="border-color: #856404;"><i class="fa-solid fa-lock"></i> Verifikasi PKS</h3>
        <input type="password" id="pks-password" placeholder="Password PKS">
        <button class="btn-export" onclick="validateAndExport()">EKSPOR PDF</button>
    </div>

    <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart;
    let userJC = "";

    async function init() {
        const email = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        const snap = await db.collection("users").where("email", "==", email).get();
        
        if(!snap.empty) {
            userJC = snap.docs[0].data().komsel;
            document.getElementById("label-jc").innerText = "Laporan Khusus: JC " + userJC;
            initChart();
            sinkronisasiRealtime();
        }
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Hadir'],
                datasets: [{
                    label: '% Capaian',
                    data: [0, 0],
                    backgroundColor: ['#3182ce', '#38a169'],
                    borderRadius: 5
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    function sinkronisasiRealtime() {
        const periode = parseInt(document.getElementById("filter-periode").value);
        const batasWaktu = new Date();
        batasWaktu.setMonth(batasWaktu.getMonth() - periode);
        const tsBatas = firebase.firestore.Timestamp.fromDate(batasWaktu);

        // 1. Ambil Data Kehadiran (Hadir & Izin)
        db.collection("kehadiran")
            .where("komsel", "==", String(userJC))
            .where("tanggal", ">=", tsBatas)
            .onSnapshot(snap => {
                let hCount = 0, iCount = 0;
                let htmlH = "", htmlI = "";
                
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "Hadir") {
                        hCount++;
                        htmlH += `<div class="name-item">${d.nama}</div>`;
                    } else {
                        iCount++;
                        htmlI += `<div class="name-item">${d.nama}<br><span class="reason">(${d.alasan || 'Izin'})</span></div>`;
                    }
                });

                document.getElementById("list-hadir").innerHTML = htmlH || "---";
                document.getElementById("list-izin").innerHTML = htmlI || "---";
                
                const total = hCount + iCount;
                myChart.data.datasets[0].data[1] = total > 0 ? Math.round((hCount/total)*100) : 0;
                myChart.update();
            });

        // 2. Ambil Data Baca Alkitab
        db.collection("laporan_bacaan")
            .where("komsel", "==", String(userJC))
            .where("tanggal", ">=", tsBatas)
            .onSnapshot(snap => {
                let htmlA = "";
                const uniqueNames = new Set();

                snap.forEach(doc => {
                    const d = doc.data();
                    uniqueNames.add(d.nama);
                });

                uniqueNames.forEach(name => {
                    htmlA += `<div class="name-item">${name}</div>`;
                });

                document.getElementById("list-alkitab").innerHTML = htmlA || "---";
                
                // Kalkulasi target (Contoh: 10 orang x 4 minggu x periode bulan)
                const target = 10 * (periode * 4); 
                const persenA = Math.min(Math.round((snap.size / target) * 100), 100);
                myChart.data.datasets[0].data[0] = persenA;
                myChart.update();
            });
    }

    // Fungsi Export PDF tetap sama dengan filter dinamis
    async function validateAndExport() {
        const pass = document.getElementById("pks-password").value;
        const check = await db.collection("users").where("komsel", "==", userJC).where("jabatan", "==", "Ketua Komsel").where("password", "==", pass).get();
        if(!check.empty) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`LAPORAN KOMSEL JC ${userJC}`, 10, 20);
            doc.text(`Periode: ${document.getElementById("filter-periode").value} Bulan`, 10, 30);
            doc.save(`JC_${userJC}_Report.pdf`);
        } else { alert("Password Salah!"); }
    }

    window.onload = init;
</script>
</body>
</html>
