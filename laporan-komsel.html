<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Komsel Lengkap - Logo Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    </head>
<body>

<script>
    async function validateAndExport() {
        const pass = document.getElementById("pks-password").value;
        const items = document.querySelectorAll(".mutasi-item");

        if(!pass || pass !== "rahasia123") { alert("Password Otoritas Salah!"); return; }
        
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();

            // --- 1. HANDLING LOGO ---
            // Pastikan ganti BASE64_LOGO_DISINI dengan kode base64 logo Bapak
            const logoBase64 = "BASE64_LOGO_DISINI"; 
            
            if (logoBase64 !== "BASE64_LOGO_DISINI") {
                // Menempatkan logo di pojok kiri atas (X:15, Y:8) dengan ukuran kecil agar tidak dorong teks
                doc.addImage(logoBase64, 'PNG', 15, 8, 18, 18);
            }

            // --- 2. KOP SURAT ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("GBI PONDOK PEMULIHAN PAPUA", pageWidth / 2, 18, { align: "center" });
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("Laporan Perkembangan Komsel JC " + userJC, pageWidth / 2, 24, { align: "center" });
            
            doc.setLineWidth(0.5);
            doc.line(15, 30, pageWidth - 15, 30); // Garis pembatas kop

            // --- 3. ISI LAPORAN LENGKAP (Sesuai Gambar 2) ---
            let y = 40; // Memulai konten di Y=40 agar tidak kena logo/kop

            // SEKSI I: ANALISA CAPAIAN PEMBACAAN ALKITAB
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.text("I. ANALISA CAPAIAN PEMBACAAN ALKITAB", 15, y);
            y += 7;
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            
            // Mengambil daftar nama lengkap dari log
            let daftarNama = "";
            items.forEach(el => { 
                daftarNama += el.getAttribute('data-nama') + " (" + el.getAttribute('data-bacaan') + "), "; 
            });
            
            let txtAlkitab = `Capaian pembacaan Alkitab mencapai ${myChart.data.datasets[0].data[0]}%. Daftar jemaat yang menyelesaikan tugas: ${daftarNama.slice(0, -2)}.`;
            let splitAlkitab = doc.splitTextToSize(txtAlkitab, pageWidth - 30);
            doc.text(splitAlkitab, 15, y);
            y += (splitAlkitab.length * 5) + 10;

            // SEKSI II: ANALISA KEHADIRAN
            doc.setFont("helvetica", "bold");
            doc.text("II. ANALISA KEHADIRAN KOMSEL", 15, y);
            y += 7;
            doc.setFont("helvetica", "normal");
            doc.text(`Tingkat kehadiran jemaat JC ${userJC} mencapai ${myChart.data.datasets[0].data[1]}% dengan partisipasi aktif jemaat inti.`, 15, y);
            y += 15;

            // SEKSI III: ANALISA KETIDAKHADIRAN (Lengkap sesuai gambar)
            doc.setFont("helvetica", "bold");
            doc.text("III. ANALISA KETIDAKHADIRAN & KETERANGAN", 15, y);
            y += 7;
            doc.setFont("helvetica", "normal");
            let txtAbsen = `Terdapat ${myChart.data.datasets[0].data[2]}% ketidakhadiran. Alasan utama didasari oleh faktor pekerjaan, kondisi kesehatan (sakit), dan kendala transportasi bagi jemaat yang berdomisili jauh.`;
            let splitAbsen = doc.splitTextToSize(txtAbsen, pageWidth - 30);
            doc.text(splitAbsen, 15, y);
            y += (splitAbsen.length * 5) + 10;

            // SEKSI IV: MASUKAN AI
            doc.setFont("helvetica", "bold");
            doc.text("IV. ANALISA MASUKAN & REFERENSI AI", 15, y);
            y += 7;
            doc.setFont("helvetica", "italic");
            let aiRef = document.getElementById("text-insight").innerText + " Rekomendasi: Tingkatkan keterlibatan melalui sharing grup digital di sela-sela hari komsel.";
            let splitAI = doc.splitTextToSize(aiRef, pageWidth - 30);
            doc.text(splitAI, 15, y);
            y += (splitAI.length * 5) + 15;

            // SEKSI V: DIAGRAM
            doc.setFont("helvetica", "bold");
            doc.text("V. DIAGRAM PERSENTASE CAPAIAN", 15, y);
            y += 5;
            const canvas = document.getElementById('performaChart');
            const imgData = canvas.toDataURL('image/png');
            doc.addImage(imgData, 'PNG', 15, y, 80, 40);

            doc.save(`Laporan_Lengkap_JC${userJC}.pdf`);
        } catch (e) { 
            console.error(e);
            alert("Terjadi kesalahan teknis saat generate PDF."); 
        }
    }
</script>
</body>
</html>
