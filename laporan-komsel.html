<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 14px; text-transform: uppercase; margin-top: 0; color: #333; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }
        
        .chart-container { position: relative; height: 250px; margin-bottom: 20px; width: 100%; }
        
        /* Gaya Mutasi Rekening BCA */
        .mutasi-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .mutasi-date { font-size: 10px; color: #888; width: 45px; font-weight: bold; }
        .mutasi-info { flex: 1; margin-left: 10px; }
        .mutasi-name { font-weight: bold; font-size: 12px; color: #333; }
        .mutasi-desc { font-size: 10px; color: #2ecc71; }
        .mutasi-status { font-size: 9px; background: #eafff0; color: #2ecc71; padding: 2px 8px; border-radius: 5px; font-weight: bold; }

        /* Gaya Insight AI */
        .insight-box { background: #eef7ff; border-left: 4px solid #007bff; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .insight-text { font-size: 12.5px; color: #333; line-height: 1.5; font-style: italic; }

        .btn-export { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #007bff; color: white; text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-calendar-check"></i> Periode Laporan</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
            <option value="4">4 Bulan Terakhir</option>
            <option value="5">5 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
        </select>
        <p id="label-jc" style="color:#007bff; font-weight:bold; margin-top: 10px;">Menghubungkan Database...</p>
    </div>

    <div class="card" id="card-insight" style="display:none;">
        <h3><i class="fa-solid fa-robot"></i> Ringkasan Insight AI</h3>
        <div class="insight-box">
            <div id="text-insight" class="insight-text">Menganalisis pertumbuhan komsel...</div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-simple"></i> Performa Real-Time</h3>
        <div class="chart-container">
            <canvas id="performaChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-list-ul"></i> Detail Aktivitas (Mutasi)</h3>
        <div id="mutasi-list">
            <div style="text-align: center; color: #bbb; font-size: 12px; padding: 20px;">Memuat riwayat...</div>
        </div>
    </div>

    <div class="card" style="background: #fff3cd;">
        <h3 style="border-color: #856404; color: #856404;"><i class="fa-solid fa-shield-halved"></i> Verifikasi PKS</h3>
        <input type="password" id="pks-password" placeholder="Masukkan Password PKS">
        <button class="btn-export" onclick="validateAndExport()">
            <i class="fa-solid fa-file-pdf"></i> EKSPOR PDF RESMI
        </button>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart;
    let userJC = "";
    let unsubKehadiran = null;
    let unsubBacaan = null;

    async function init() {
        let emailRaw = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        const email = emailRaw.trim().toLowerCase();
        
        try {
            const snap = await db.collection("users").where("email", "==", email).get();
            if(!snap.empty) {
                userJC = String(snap.docs[0].data().komsel);
                document.getElementById("label-jc").innerText = "Laporan Khusus: JC " + userJC;
                initChart();
                sinkronisasiRealtime();
            }
        } catch (e) { console.error(e); }
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Firman', 'Hadir'],
                datasets: [{
                    label: '% Capaian',
                    data: [0, 0],
                    backgroundColor: ['#3182ce', '#38a169'],
                    borderRadius: 8
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    function sinkronisasiRealtime() {
        if (unsubKehadiran) unsubKehadiran();
        if (unsubBacaan) unsubBacaan();

        const periode = parseInt(document.getElementById("filter-periode").value);
        const batasWaktu = new Date();
        batasWaktu.setMonth(batasWaktu.getMonth() - periode);
        const tsBatas = firebase.firestore.Timestamp.fromDate(batasWaktu);
        
        unsubBacaan = db.collection("laporan_bacaan")
            .where("komsel", "==", userJC)
            .where("tanggal", ">=", tsBatas)
            .onSnapshot(snap => {
                let html = "";
                let count = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    count++;
                    const tgl = d.tanggal.toDate().toLocaleDateString('id-ID', {day:'2-digit', month:'short'});
                    html += `
                        <div class="mutasi-item">
                            <div class="mutasi-date">${tgl}</div>
                            <div class="mutasi-info">
                                <div class="mutasi-name">${d.nama}</div>
                                <div class="mutasi-desc">Selesai Baca: ${d.pasal_utama || '-'}</div>
                            </div>
                            <div class="mutasi-status">BERHASIL</div>
                        </div>`;
                });
                document.getElementById("mutasi-list").innerHTML = html || '<div style="text-align:center; padding:20px; color:#bbb;">Tidak ada aktivitas.</div>';
                
                const target = 20 * (periode * 4); 
                const persen = Math.min(Math.round((count/target)*100), 100);
                myChart.data.datasets[0].data[0] = persen;
                myChart.update();
                generateInsight(persen);
            });
    }

    function generateInsight(persen) {
        const box = document.getElementById("card-insight");
        const txt = document.getElementById("text-insight");
        box.style.display = "block";

        if (persen >= 80) {
            txt.innerText = "Luar biasa! Pertumbuhan rohani di JC " + userJC + " sangat stabil. Jemaat menunjukkan komitmen tinggi terhadap Firman Tuhan. Terus fasilitasi momentum ini.";
        } else if (persen >= 50) {
            txt.innerText = "Kondisi JC " + userJC + " cukup baik. Ada tren positif dalam kehadiran. Disarankan PKS memberikan apresiasi kecil di grup WA untuk menjaga semangat jemaat.";
        } else {
            txt.innerText = "Tingkat partisipasi JC " + userJC + " perlu perhatian. Disarankan melakukan visitasi digital atau kontak personal kepada jemaat yang jarang melapor periode ini.";
        }
    }

    async function validateAndExport() {
        const pass = document.getElementById("pks-password").value;
        if(!pass) { alert("Masukkan password PKS!"); return; }
        
        try {
            const check = await db.collection("users").where("komsel", "==", userJC).where("jabatan", "==", "Ketua Komsel").where("password", "==", pass).get();
            
            if(!check.empty) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const insightText = document.getElementById("text-insight").innerText;
                const periodeText = document.getElementById("filter-periode").options[document.getElementById("filter-periode").selectedIndex].text;

                // --- 1. KOP SURAT ---
                doc.setFont("helvetica", "bold");
                doc.setFontSize(16);
                doc.text("GBI PONDOK PEMULIHAN PAPUA", 105, 20, { align: "center" });
                
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                doc.text(`Laporan Perkembangan Komsel JC ${userJC}`, 105, 28, { align: "center" });
                
                doc.setLineWidth(0.8);
                doc.line(20, 32, 190, 32); 
                doc.setLineWidth(0.2);
                doc.line(20, 33.5, 190, 33.5);

                // --- 2. INFO LAPORAN ---
                doc.setFontSize(10);
                doc.text(`Periode: ${periodeText}`, 20, 45);
                doc.text(`Tanggal Cetak: ${new Date().toLocaleString('id-ID')}`, 20, 50);

                // --- 3. PERFORMA REALTIME (DARI CHART) ---
                doc.setFont("helvetica", "bold");
                doc.text("PERFORMA CAPAIAN (%)", 20, 60);
                doc.setFont("helvetica", "normal");
                const valFirman = myChart.data.datasets[0].data[0];
                const valHadir = myChart.data.datasets[0].data[1];
                doc.text(`- Baca Firman: ${valFirman}%`, 25, 65);
                doc.text(`- Kehadiran   : ${valHadir}%`, 25, 70);

                // --- 4. RINGKASAN INSIGHT AI ---
                doc.setFont("helvetica", "bold");
                doc.text("RINGKASAN PERKEMBANGAN (AI):", 20, 80);
                doc.setFont("helvetica", "italic");
                const splitInsight = doc.splitTextToSize(insightText, 170);
                doc.text(splitInsight, 20, 85);

                // --- 5. DAFTAR AKTIVITAS (MUTASI) ---
                let yPos = 90 + (splitInsight.length * 6);
                doc.setFont("helvetica", "bold");
                doc.text("DETAIL AKTIVITAS JEMAAT (MUTASI):", 20, yPos);
                yPos += 7;

                doc.setFontSize(9);
                doc.setFont("helvetica", "bold");
                doc.text("TGL", 20, yPos);
                doc.text("NAMA JEMAAT / AKTIVITAS", 45, yPos);
                doc.text("STATUS", 170, yPos);
                doc.line(20, yPos + 2, 190, yPos + 2);
                yPos += 8;

                doc.setFont("helvetica", "normal");
                const items = document.querySelectorAll(".mutasi-item");
                items.forEach((item) => {
                    if (yPos > 270) { doc.addPage(); yPos = 20; }
                    const tgl = item.querySelector(".mutasi-date").innerText;
                    const nama = item.querySelector(".mutasi-name").innerText;
                    const desc = item.querySelector(".mutasi-desc").innerText;
                    
                    doc.text(tgl, 20, yPos);
                    doc.text(`${nama} (${desc})`, 45, yPos);
                    doc.text("BERHASIL", 170, yPos);
                    yPos += 7;
                });

                // --- 6. TANDA TANGAN ---
                yPos += 15;
                if (yPos > 250) { doc.addPage(); yPos = 30; }
                doc.setFont("helvetica", "bold");
                doc.text("Jayapura, " + new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}), 150, yPos, { align: "center" });
                doc.text("Mengetahui,", 150, yPos + 7, { align: "center" });
                doc.text("Ketua Komsel JC " + userJC, 150, yPos + 32, { align: "center" });
                doc.line(125, yPos + 33, 175, yPos + 33);

                doc.save(`Laporan_Resmi_JC${userJC}.pdf`);
            } else { alert("Password Salah atau Anda bukan Ketua Komsel!"); }
        } catch (e) { alert("Error: " + e.message); }
    }

    window.onload = init;
</script>
</body>
</html>
