<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #6c757d;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --light-bg: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #eef2f7; 
            margin: 0; 
            padding: 12px;
            padding-bottom: 100px;
            color: #333;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; 
            padding: 18px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            margin-bottom: 15px; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        h3 { 
            font-size: 14px; 
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase; 
            margin: 0 0 15px 0; 
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .d-flex { display: flex; }
        .justify-content-between { justify-content: space-between; }
        .mb-1 { margin-bottom: 4px; }
        .mb-2 { margin-bottom: 8px; }
        .mt-3 { margin-top: 16px; }
        .fw-bold { font-weight: bold; }
        .text-warning { color: #b8860b !important; }
        .text-uppercase { text-transform: uppercase; }

        .progress {
            background-color: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            display: flex;
        }
        .progress-bar {
            background-color: #b8860b;
            transition: width 0.6s ease;
        }

        /* Style lainnya tetap sama seperti sebelumnya */
        select, input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; 
            font-size: 14px; font-weight: 600; background-color: #fcfcfc; box-sizing: border-box;
        }
        .insight-box { border-left: 5px solid var(--primary); padding: 15px; border-radius: 12px; background: #f0f7ff; }
        .ai-badge { position: absolute; top: -10px; right: 15px; background: var(--primary); color: white; font-size: 9px; padding: 3px 10px; border-radius: 10px; font-weight: bold; }
        .btn-export { background: var(--success); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; margin-top: 15px; text-transform: uppercase; }
        .btn-back { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; }
        .btn-back-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px; background: white; border-top: 1px solid #eee; z-index: 1000; box-sizing: border-box; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 20px; max-height: 80vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="background: var(--primary); color: white; border: none;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
                <p style="margin: 0; font-size: 11px; font-weight: bold; opacity: 0.8;">OFFICIAL REPORT</p>
                <h2 id="label-jc" style="margin: 0; font-size: 20px; font-weight: 900;">JC - ANALYTICS</h2>
            </div>
            <i class="fa-solid fa-shield-halved" style="font-size: 24px; opacity: 0.5;"></i>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Rentang Analisis</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
        </select>
    </div>

    <div class="card" id="card-insight" style="display:none; position: relative;">
        <div class="ai-badge"><i class="fas fa-microchip"></i> AI ENGINE ACTIVE</div>
        <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Pertumbuhan Komsel</h3>
        <div class="insight-box">
            <div id="text-insight" class="insight-text">Menganalisis data...</div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-pie"></i> Visualisasi Capaian</h3>
        <div style="height: 200px;">
            <canvas id="performaChart"></canvas>
        </div>
    </div>

    <div class="card mt-3">
        <h3 style="color: #b8860b;"><i class="fas fa-praying-hands"></i> Capaian Doa (SLA)</h3>
        <hr style="opacity: 0.1; margin-bottom: 15px;">
        <div class="d-flex justify-content-between mb-2">
            <span style="font-size: 13px;">Rata-rata Jawaban (SLA)</span>
            <span id="komsel-sla-days" class="fw-bold text-warning">0 Hari</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
            <span style="font-size: 13px;">Total Doa Masuk</span>
            <span id="komsel-total-doa" class="fw-bold text-warning">0</span>
        </div>
        <div class="d-flex justify-content-between mb-1">
            <span style="font-size: 13px;">Persentase Doa Dijawab</span>
            <span id="komsel-persen-doa" class="fw-bold text-warning">0.0%</span>
        </div>
        <div class="progress" style="height: 10px; margin-top: 10px;">
            <div id="komsel-progress-doa" class="progress-bar" role="progressbar" style="width: 0%"></div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-list-check"></i> Log Aktifitas</h3>
        <button class="btn-open-log" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--primary); color:var(--primary); font-weight:bold; background:none; cursor:pointer;" onclick="toggleLogModal(true)">
            <i class="fa-solid fa-clock-rotate-left"></i> LIHAT DETAIL LOG
        </button>
    </div>

    <div class="card export-card" style="background: #fffdf5; border: 1.5px dashed #ffd54f;">
        <h3 style="color: #856404;"><i class="fa-solid fa-signature"></i> Otoritas PKS</h3>
        <input type="password" id="pks-password" placeholder="Password PKS / Admin" style="margin-bottom: 10px;">
        <button class="btn-export" onclick="validateAndExport()">
            <i class="fa-solid fa-file-pdf"></i> GENERATE PDF RESMI
        </button>
    </div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI KE PANEL UTAMA
        </a>
    </div>
</div>

<div id="modal-log" class="modal-overlay" onclick="toggleLogModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; color: var(--primary);">LOG AKTIFITAS</div>
        <div id="mutasi-list" style="padding: 15px; overflow-y: auto;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart;
    let userJC = "";

    async function init() {
        // Mengambil email dari localStorage atau default untuk testing
        let emailRaw = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        const email = emailRaw.trim().toLowerCase();
        
        try {
            const snap = await db.collection("users").where("email", "==", email).get();
            if(!snap.empty) {
                userJC = String(snap.docs[0].data().komsel);
                document.getElementById("label-jc").innerText = "ANALISA JC " + userJC;
                
                initChart();
                sinkronisasiRealtime();
                
                // MENGAKTIFKAN LISTENER REALTIME UNTUK CAPAIAN DOA
                listenCapaianDoaRealtime(userJC);
            }
        } catch (e) { console.error("Error saat inisialisasi:", e); }
    }

    // --- FUNGSI CAPAIAN DOA REALTIME (ONSNAPSHOT) ---
    function listenCapaianDoaRealtime(namaKomsel) {
        // Menjalankan listener otomatis setiap ada perubahan data
        db.collection("laporan_doa")
          .where("jc", "==", namaKomsel)
          .onSnapshot((snapshot) => {
            
            let totalDoa = snapshot.size; // Total dokumen yang ditemukan
            let doaTerjawab = 0;
            let totalSLADays = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                // Menghitung jumlah doa yang field 'terjawab' nya true
                if (data.terjawab === true) {
                    doaTerjawab++;
                    
                    // Logika perhitungan SLA (Selisih Hari)
                    if (data.tglInput && data.tglTerjawab) {
                        const tglMasuk = data.tglInput.toDate();
                        const tglSelesai = data.tglTerjawab.toDate();
                        const diffTime = Math.abs(tglSelesai - tglMasuk);
                        totalSLADays += Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    }
                }
            });

            // Menghitung Persentase & Rata-rata
            let persentase = totalDoa > 0 ? (doaTerjawab / totalDoa) * 100 : 0;
            let rataRataSLA = doaTerjawab > 0 ? Math.round(totalSLADays / doaTerjawab) : 0;

            // UPDATE UI SECARA OTOMATIS
            document.getElementById("komsel-total-doa").innerText = totalDoa;
            document.getElementById("komsel-persen-doa").innerText = persentase.toFixed(1) + "%";
            document.getElementById("komsel-sla-days").innerText = rataRataSLA + " Hari";
            
            // Update Progress Bar (Elemen visual berwarna kuning)
            const progressBar = document.getElementById("komsel-progress-doa");
            if(progressBar) {
                progressBar.style.width = persentase + "%";
            }

            console.log("Update Realtime: Total Doa " + totalDoa + " untuk " + namaKomsel);
        }, (error) => {
            console.error("Gagal mendengarkan perubahan data doa:", error);
        });
    }

    // --- FUNGSI CHART & LAINNYA ---
    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Hadir', 'Absen'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#0056b3', '#28a745', '#dc3545'],
                    borderRadius: 10,
                    barThickness: 40
                }]
            },
            options: { 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
    }

    function sinkronisasiRealtime() {
        const periode = parseInt(document.getElementById("filter-periode").value);
        db.collection("laporan_bacaan")
          .where("komsel", "==", userJC)
          .onSnapshot(snap => {
            let count = snap.size;
            let target = 20 * (periode * 4);
            let persenAlkitab = Math.min(Math.round((count/target)*100), 100);
            
            // Update data grafik
            myChart.data.datasets[0].data = [persenAlkitab, 85, 15]; 
            myChart.update();
            
            document.getElementById("card-insight").style.display = "block";
            document.getElementById("text-insight").innerText = "Menganalisis data Komsel JC " + userJC + "...";
        });
    }

    function toggleLogModal(show) { document.getElementById("modal-log").style.display = show ? "flex" : "none"; }

    // Jalankan inisialisasi saat halaman selesai dimuat
    window.onload = init;
</script>

</body>
</html>
