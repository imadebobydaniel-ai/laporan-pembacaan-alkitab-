<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid red; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-keluar { background: #666; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-input { padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { background: red; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; font-size: 14px; }
        tr:hover { background-color: #f9f9f9; }

        /* Style saat Edit Aktif */
        .mode-edit { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; color: black; }
        .dropdown-edit { padding: 5px; border-radius: 4px; border: 1px solid orange; font-family: inherit; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2><i class="fa-solid fa-database"></i> Database Administrator</h2>
        <button class="btn-keluar" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        <input type="text" id="inputCari" class="search-input" placeholder=" Cari Nama atau No HP...">
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox" id="checkAll"></th>
                <th>Nama Lengkap</th>
                <th>Email</th>
                <th>Nomor HP</th>
                <th>Alamat Tempat Tinggal</th>
                <th>Jabatan Komsel</th>
                <th>Gol. Darah</th>
            </tr>
        </thead>
        <tbody id="isiTabel">
            <tr>
                <td><input type="checkbox" class="user-checkbox"></td>
                <td class="bisa-edit">Boby Daniel</td>
                <td class="bisa-edit">boby.daniel4@gmail.com</td>
                <td class="bisa-edit">081283393576</td>
                <td class="bisa-edit">Jl. tanah Hitam Abe pantai</td>
                <td class="bisa-edit">Ketua Komsel</td>
                <td class="darah-cell">AB</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 1. FUNGSI LOGOUT
    document.getElementById('btnLogout').onclick = function() {
        if(confirm("Apakah Anda yakin ingin keluar?")) {
            window.location.href = "index.html";
        }
    };

    // 2. FUNGSI EDIT (TEKS + DROPDOWN GOL DARAH)
    document.getElementById('btnEdit').onclick = function() {
        let selected = document.querySelectorAll('.user-checkbox:checked');
        
        if (selected.length === 0) {
            alert("Centang data yang ingin di-edit terlebih dahulu!");
            return;
        }

        selected.forEach(cb => {
            let row = cb.closest('tr');
            
            // Edit kolom teks biasa (Nama, Email, HP, Alamat, Jabatan)
            let cells = row.querySelectorAll('.bisa-edit');
            cells.forEach(cell => {
                cell.contentEditable = "true";
                cell.classList.add('mode-edit');
            });

            // Edit kolom Golongan Darah (Berubah jadi Dropdown)
            let cellDarah = row.querySelector('.darah-cell');
            if (!cellDarah.querySelector('select')) {
                let currentVal = cellDarah.innerText.trim();
                let options = ['O', 'A', 'B', 'AB', 'AB+'];
                let selectHtml = `<select class="dropdown-edit">`;
                options.forEach(opt => {
                    selectHtml += `<option value="${opt}" ${opt === currentVal ? 'selected' : ''}>${opt}</option>`;
                });
                selectHtml += `</select>`;
                cellDarah.innerHTML = selectHtml;
            }
        });
        alert("Mode Edit Aktif! Silakan ubah data langsung di tabel.");
    };

    // 3. FUNGSI HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length === 0) return alert("Pilih data yang mau dihapus!");
        
        if (confirm("Hapus " + selected.length + " data terpilih?")) {
            selected.forEach(cb => cb.closest('tr').remove());
        }
    };

    // 4. FUNGSI CARI (SEARCH)
    document.getElementById('inputCari').onkeyup = function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#isiTabel tr');
        
        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    };

    // 5. FUNGSI CHECK ALL
    document.getElementById('checkAll').onclick = function() {
        let checkboxes = document.querySelectorAll('.user-checkbox');
        checkboxes.forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
