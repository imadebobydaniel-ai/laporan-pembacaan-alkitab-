// Bagian dalam fungsi loadUsers()
snapshot.forEach(doc => {
    const data = doc.data();
    userList.innerHTML += `
        <tr>
            <td>${data.nama || '-'}</td>
            <td>${data.alamat || '-'}</td>
            <td>${data.no_hp || '-'}</td>
            <td>${data.gol_darah || '-'}</td>
            <td>${data.jabatan || 'Anggota'}</td> <td>${data.komsel || '-'}</td>
            <td>
                <button class="btn-edit" onclick="bukaEdit('${doc.id}')">Edit</button>
                <button class="btn-hapus" onclick="hapusUser('${doc.id}')">Hapus</button>
            </td>
        </tr>`;
});
