<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator - Pondok Pemulihan Papua</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf-plugin-autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        h2 { border-bottom: 3px solid #0084ff; padding-bottom: 10px; color: #1c1e21; margin-top: 0; }
        
        .header-tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; text-decoration: none; }
        .btn-back { background: #6c757d; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #dc3545; }
        .btn-danger { background: #ff4757; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #0084ff; color: white; padding: 15px 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 13px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: #0084ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>
    
    <div class="header-tools">
        <a href="index.html" class="btn btn-back">← Kembali</a>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf" onclick="exportPDFTerpilih()">Export Terpilih (PDF)</button>
        <button class="btn btn-danger" onclick="hapusMasal()">Hapus Terpilih</button>
    </div>

    <div class="table-responsive">
        <table id="tabelAnggota">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="checkMaster" onclick="pilihSemua(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="row-1">
                    <td><input type="checkbox" class="pilih-user"></td>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                    <td>
                        <button onclick="bukaModalEdit('row-1')" style="background:#ffc107; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">Edit</button>
                    </td>
                </tr>
                <tr id="row-2">
                    <td><input type="checkbox" class="pilih-user"></td>
                    <td>Budi Santoso</td>
                    <td>budi@gmail.com</td>
                    <td>User123</td>
                    <td>08123456789</td>
                    <td>O</td>
                    <td>Ketua Komsel</td>
                    <td>JC 1</td>
                    <td>
                        <button onclick="bukaModalEdit('row-2')" style="background:#ffc107; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">Edit</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Logika Checkbox
    function pilihSemua(master) {
        const checkboxes = document.querySelectorAll('.pilih-user');
        checkboxes.forEach(cb => cb.checked = master.checked);
    }

    function hapusMasal() {
        const terpilih = document.querySelectorAll('.pilih-user:checked');
        if (terpilih.length === 0) return alert("Pilih data dulu!");
        if (confirm("Hapus " + terpilih.length + " data?")) {
            terpilih.forEach(cb => cb.closest('tr').remove());
        }
    }

    // 2. Logika PDF (FIXED & TESTED)
    function exportPDFTerpilih() {
        // Cek apakah library sudah terload
        if (typeof window.jspdf === 'undefined') {
            alert("Sistem PDF sedang loading, coba lagi dalam 2 detik.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const terpilih = document.querySelectorAll('.pilih-user:checked');
        
        if (terpilih.length === 0) {
            alert("Centang dulu data yang ingin di-export!");
            return;
        }

        const dataPDF = [];
        terpilih.forEach(cb => {
            const row = cb.closest('tr');
            const td = row.querySelectorAll('td');
            // Ambil data kolom 1 s/d 7 (Nama s/d Komsel)
            dataPDF.push([
                td[1].innerText, 
                td[2].innerText, 
                td[3].innerText, 
                td[4].innerText, 
                td[5].innerText, 
                td[6].innerText, 
                td[7].innerText
            ]);
        });

        // Judul Laporan
        doc.setFontSize(16);
        doc.text("LAPORAN DATA ANGGOTA - PONDOK PEMULIHAN PAPUA", 14, 15);
        
        // Cek fungsi autoTable
        if (typeof doc.autoTable !== 'function') {
            alert("Maaf, fungsi tabel PDF gagal dimuat. Coba refresh halaman (F5).");
            return;
        }

        doc.autoTable({
            head: [['Nama Lengkap', 'Email', 'Password', 'No HP', 'Gol', 'Jabatan', 'Komsel']],
            body: dataPDF,
            startY: 25,
            styles: { fontSize: 9 },
            headStyles: { fillColor: [0, 132, 255] },
            theme: 'grid'
        });

        doc.save("Laporan_Anggota_PPP.pdf");
    }

    function bukaModalEdit(id) { alert("Fungsi Edit siap."); }
</script>

</body>
</html>
