<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid red; padding-bottom: 15px; margin-bottom: 20px; }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: bold; }
        .btn-keluar { background: #666; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-wrapper { position: relative; flex: 1; max-width: 350px; }
        .search-input { width: 100%; padding: 10px 12px 10px 35px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #888; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1000px; }
        thead { background: red; color: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; }
        tr:hover { background-color: #f9f9f9; }
        .password-cell { color: red; font-weight: bold; }
        .editing-mode { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div class="header-title"><i class="fa-solid fa-database"></i> Database Administrator</div>
        <button class="btn-keluar" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="window.location.reload()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="pencarian" class="search-input" placeholder="Cari Nama atau No HP...">
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30px;"><input type="checkbox" id="pilihSemua"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat Tempat Tinggal</th>
                    <th>Jabatan Komsel</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                <tr>
                    <td><input type="checkbox" class="cek-baris"></td>
                    <td class="data-kolom">Boby Daniel</td>
                    <td class="data-kolom">boby.daniel4@gmail.com</td>
                    <td class="data-kolom password-cell">Bukadong821</td>
                    <td class="data-kolom">081283393576</td>
                    <td class="data-kolom">Jl. tanah Hitam Abe pantai</td>
                    <td class="data-kolom">Ketua Komsel</td>
                    <td class="data-kolom">JC 5</td>
                    <td class="data-kolom">AB</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. FUNGSI LOGOUT (PASTI JALAN)
    document.getElementById('logoutBtn').onclick = function() {
        if(confirm("Keluar dari Sistem Administrator?")) {
            window.location.href = 'index.html';
        }
    };

    // 2. FUNGSI EDIT (PASTI AKTIF)
    document.getElementById('btnEdit').onclick = function() {
        const dipilih = document.querySelectorAll('.cek-baris:checked');
        if (dipilih.length === 0) {
            alert("Centang dulu data yang mau di-edit!");
            return;
        }
        dipilih.forEach(cb => {
            const baris = cb.closest('tr');
            const kolom = baris.querySelectorAll('.data-kolom');
            kolom.forEach(cell => {
                cell.contentEditable = "true";
                cell.classList.add('editing-mode');
            });
        });
        alert("Mode Edit Aktif pada baris terpilih.");
    };

    // 3. FUNGSI HAPUS (PASTI BERHASIL)
    document.getElementById('btnHapus').onclick = function() {
        const dipilih = document.querySelectorAll('.cek-baris:checked');
        if (dipilih.length === 0) {
            alert("Centang data yang ingin dihapus!");
            return;
        }
        if (confirm("Hapus " + dipilih.length + " data?")) {
            dipilih.forEach(cb => cb.closest('tr').remove());
        }
    };

    // 4. FUNGSI SEARCH (PASTI FILTER)
    document.getElementById('pencarian').onkeyup = function() {
        const kataKunci = this.value.toLowerCase();
        const semuaBaris = document.querySelectorAll('#badanTabel tr');
        semuaBaris.forEach(baris => {
            const isiBaris = baris.innerText.toLowerCase();
            baris.style.display = isiBaris.includes(kataKunci) ? "" : "none";
        });
    };

    // 5. FUNGSI CHECKBOX SELECT ALL
    document.getElementById('pilihSemua').onclick = function() {
        const checkboxes = document.querySelectorAll('.cek-baris');
        checkboxes.forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
