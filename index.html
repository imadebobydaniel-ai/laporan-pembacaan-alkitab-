<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .logo { width: 80px; height: 80px; margin-bottom: 10px; border-radius: 50%; }
        h2 { color: #1c1e21; margin-bottom: 5px; }
        p { color: #606770; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #0084ff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0073e6; }
        .footer-link { margin-top: 20px; font-size: 13px; color: #606770; }
        .footer-link a { color: #0084ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h2>Masuk Aplikasi</h2>
    <p>Gunakan Email & Password Anda</p>

    <input type="email" id="email" placeholder="Alamat Email">
    <input type="password" id="password" placeholder="Kata Sandi">

    <button type="button" onclick="prosesLogin()">Masuk Sekarang</button>

    <div class="footer-link">
        Belum punya akun? <br>
        <a href="profile.html">Daftar Anggota Baru</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function prosesLogin() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!email || !password) {
            alert("Harap isi Email dan Password!");
            return;
        }

        auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            // Login Berhasil
            window.location.href = "main_menu.html";
        })
        .catch((error) => {
            // Jika Gagal
            let pesanError = "Gagal masuk. Periksa email dan password Anda.";
            if (error.code === 'auth/user-not-found') pesanError = "Email tidak terdaftar!";
            if (error.code === 'auth/wrong-password') pesanError = "Password salah!";
            
            alert(pesanError);
            console.error(error.message);
        });
    }
</script>

</body>
</html>
