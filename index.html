<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        img { width: 80px; margin-bottom: 10px; border-radius: 50%; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0084ff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-admin { background-color: #ff003c; }
        .link-action { display: block; margin-top: 15px; color: #0084ff; text-decoration: none; font-size: 14px; font-weight: bold; padding: 10px; border: 1px dashed #0084ff; border-radius: 6px; }

        /* MODAL CUSTOM UNTUK HP */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="logo_pondok.png" alt="Logo">
    <h2>Pondok Pemulihan</h2>
    
    <input type="email" id="emailUser" placeholder="Email Anggota">
    <input type="password" id="passUser" placeholder="Password">
    <button onclick="loginUser()">Masuk Sekarang</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <button class="btn-admin" onclick="bukaModalAdmin()">Akses Administrator</button>
    
    <a href="daftar.html" class="link-action">Daftar Anggota Baru</a>
</div>

<div id="modalAdmin" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">Login Admin</h3>
        <p style="font-size:12px; color:#666;">Masukkan PIN Khusus</p>
        <input type="password" id="pinAdmin" placeholder="PIN Rahasia" style="text-align:center; font-size:18px;">
        <button style="background-color:#ff003c;" onclick="cekPin()">Buka Database</button>
        <button style="background-color:#999;" onclick="tutupModalAdmin()">Batal</button>
    </div>
</div>

<script>
    // Fungsi Buka Tutup Modal
    function bukaModalAdmin() { 
        document.getElementById('modalAdmin').style.display = 'flex'; 
        document.getElementById('pinAdmin').focus();
    }
    function tutupModalAdmin() { 
        document.getElementById('modalAdmin').style.display = 'none'; 
        document.getElementById('pinAdmin').value = '';
    }

    // Cek PIN
    function cekPin() {
        const pin = document.getElementById('pinAdmin').value;
        if (pin === "admin2026") {
            window.location.href = 'admin_portal.html';
        } else {
            alert("PIN Salah!");
            document.getElementById('pinAdmin').value = '';
        }
    }

    // Login User Standar
    function loginUser() {
        alert("Silakan daftar jika belum memiliki akun.");
    }
</script>
</body>
</html>
