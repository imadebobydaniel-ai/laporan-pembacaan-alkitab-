<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        img.logo { width: 100px; margin-bottom: 15px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .strength { font-size: 12px; margin-top: -5px; margin-bottom: 10px; text-align: left; padding-left: 15px; }
        .weak { color: red; }
        .strong { color: green; }
        
        /* Layar Loading */
        #loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <div class="spinner"></div>
    <p>Mohon Tunggu...</p>
</div>

<div id="auth-form" class="card">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h3>Pendaftaran Anggota</h3>
    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password" oninput="validatePassword(this.value)">
    <div id="strength-text" class="strength">Kekuatan Password: -</div>
    <button onclick="prosesLogin()">Daftar / Login</button>
</div>

<script>
    function validatePassword(pass) {
        let text = document.getElementById('strength-text');
        // Syarat: Minimal 8 karakter, 1 Huruf Besar, 1 Angka, 1 Simbol
        let regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        
        if (pass.length === 0) {
            text.innerHTML = "Kekuatan Password: -";
            text.className = "strength";
        } else if (regex.test(pass)) {
            text.innerHTML = "Kekuatan Password: **Strong**";
            text.className = "strength strong";
        } else {
            text.innerHTML = "Kekuatan Password: **Weak** (Butuh Huruf Besar, Angka, & Simbol)";
            text.className = "strength weak";
        }
    }

    function prosesLogin() {
        let email = document.getElementById('email').value;
        let pass = document.getElementById('pass').value;

        // Cek Akses Admin
        if (email === "admin@mail.com" && pass === "admin2026") {
            startLoading("Selamat Datang Admin!");
            return;
        }

        // Cek Validasi standar (Untuk User Umum)
        if (email !== "" && pass !== "") {
            startLoading("Pendaftaran Berhasil!");
        } else {
            alert("Harap isi semua data!");
        }
    }

    function startLoading(msg) {
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        
        setTimeout(() => {
            // Ganti ini dengan halaman laporan kamu setelah login berhasil
            alert(msg);
            window.location.href = "halaman_laporan.html"; 
        }, 3000);
    }
</script>
</body>
</html>
