<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 15px; }
        h2 { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; }
        h3 { color: #ffcc00; margin-bottom: 25px; font-size: 16px; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); background: #2c3e50; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .form-group { margin-bottom: 15px; position: relative; text-align: left; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; }
        .btn-login { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .footer-links { margin-top: 25px; font-size: 14px; color: #666; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; }
        .admin-link { display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 12px; }

        /* MODAL STYLE */
        .modal-overlay { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .btn-ok { background-color: #003366; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <h3>Sistem Informasi Komsel JC</h3>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Silahkan Login Anggota</p>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Anggota" required>
            </div>
            <div class="form-group">
                <input type="password" id="pass" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIconLogin" onclick="togglePassLogin()"></i>
            </div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>

        <div class="footer-links">
            Belum punya akun? <a href="registrasi.html">Daftar Sekarang</a>
        </div>
        <a href="login_cyber.html" class="admin-link">Masuk sebagai Admin</a>
        
        <a href="#" onclick="location.replace('index.html');" style="text-decoration:none;">
            <p style="text-align:center; color:#003366; font-size:14px; margin-top:15px;">
                <i class="fa-solid fa-circle-left"></i> Kembali ke Menu Utama
            </p>
        </a>
    </div>

    <div id="loginAlertModal" class="modal-overlay">
        <div class="modal-content">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 40px; color: #e11d48; margin-bottom: 15px;"></i>
            <h3 style="background: none; color: #333; text-shadow: none; padding: 0;">Pesan Sistem</h3>
            <p id="alertMessage" style="color: #666; font-size: 14px; margin-top: 10px;">Email atau Password Salah!</p>
            <button id="closeAlert" class="btn-ok">OK</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 1. PENCEGAH BACK
        (function () {
            history.pushState(null, null, location.href);
            window.onpopstate = function () {
                history.pushState(null, null, location.href);
            };
        })();

        // 2. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 3. FUNGSI UI LOGIN
        const alertModal = document.getElementById('loginAlertModal');
        const alertText = document.getElementById('alertMessage');
        const closeBtn = document.getElementById('closeAlert');

        function tampilkanPesan(pesan) {
            alertText.innerText = pesan;
            alertModal.style.display = 'flex';
        }

        closeBtn.onclick = () => alertModal.style.display = 'none';

        function togglePassLogin() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eyeIconLogin');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // 4. LOGIKA LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('pass').value;

            try {
                const snapshot = await db.collection("users")
                    .where("email", "==", email)
                    .where("password", "==", password)
                    .get();

                if (!snapshot.empty) {
                    const userData = snapshot.docs[0].data();
                    localStorage.setItem("userEmail", email);
                    localStorage.setItem("userName", userData.nama || "Anggota");
                    window.location.replace("menu.html"); 
                } else {
                    tampilkanPesan("Email atau Password Salah! Pastikan penulisan sudah benar.");
                }
            } catch (err) {
                tampilkanPesan("Gagal terhubung ke database.");
            }
        });

        // 5. FUNGSI MEDIA PLAYER MULTIFUNGSI (DEBUG MODE)
        // Catatan: Fungsi ini harus dipanggil di halaman yang memiliki elemen ID 'player'
        function inisialisasiMediaPlayer() {
            const playerDiv = document.getElementById("player");
            const newsLabel = document.getElementById("newsLabel");
            const newsTitle = document.getElementById("newsTitle");

            if (!playerDiv) return; // Mencegah error jika dijalankan di halaman login yang tidak ada ID player

            console.log("Memulai koneksi ke Firestore untuk Media Player...");

            db.collection("media_player").where("active", "==", true).limit(1).onSnapshot((snapshot) => {
                console.log("Jumlah data ditemukan:", snapshot.size);

                if (snapshot.empty) {
                    console.log("Hasil: Snapshot Kosong. Cek field 'active' di Firestore (harus tipe Boolean true).");
                    playerDiv.innerHTML = `<div style="color:white; padding:20px; text-align:center;">Belum ada media aktif</div>`;
                    if(newsLabel) newsLabel.innerText = "";
                    if(newsTitle) newsTitle.innerText = "";
                    return;
                }

                const data = snapshot.docs[0].data();
                console.log("Isi data dari Firestore:", data);

                const type = data.type;
                const content = data.content;

                playerDiv.innerHTML = "";
                if(newsLabel) newsLabel.innerText = "MEDIA AKTIF";
                if(newsTitle) newsTitle.innerText = "Informasi Pondok Pemulihan";
                
                if (type === "youtube") {
                    let videoId = "";
                    if (content.includes("v=")) videoId = content.split("v=")[1].substring(0, 11);
                    else if (content.includes("youtu.be/")) videoId = content.split("youtu.be/")[1].substring(0, 11);
                    playerDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
                } 
                else if (type === "video") {
                    playerDiv.innerHTML = `<video controls autoplay muted style="width:100%; height:100%; object-fit:cover;"><source src="${content}" type="video/mp4"></video>`;
                } 
                else if (type === "image") {
                    playerDiv.innerHTML = `<img src="${content}" style="width:100%; height:100%; object-fit:contain;">`;
                } 
                else if (type === "pdf") {
                    playerDiv.innerHTML = `<iframe src="${content}#toolbar=0" style="width:100%; height:100%; border:none;"></iframe>`;
                } 
                else if (type === "text") {
                    playerDiv.innerHTML = `<div style="background:#2c3e50; width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:20px; color:white; text-align:center; font-weight:bold;">${content}</div>`;
                }
            }, (error) => {
                console.error("Error dari Firestore Rules:", error.message);
                if(playerDiv) playerDiv.innerHTML = `<div style="color:red; padding:20px;">Error: ${error.message}</div>`;
            });
        }
    </script>
</body>
</html>
