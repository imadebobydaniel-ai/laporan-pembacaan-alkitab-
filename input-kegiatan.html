<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kegiatan - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --merah-notif: #e11d48; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--merah-notif); }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        /* Ikon Mata untuk Password */
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; }

        .btn-send { background: var(--merah-notif); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; margin-top: 10px; }
        
        /* Riwayat & Tombol Aksi */
        .history-item { background: #fff; border-left: 5px solid var(--merah-notif); padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .action-buttons { display: flex; gap: 15px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-edit { color: #0056b3; cursor: pointer; font-size: 14px; font-weight: bold; text-decoration: none; }
        .btn-delete { color: var(--merah-notif); cursor: pointer; font-size: 14px; font-weight: bold; text-decoration: none; }

        /* Modal Styling */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 51, 102, 0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 100%; max-width: 350px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-confirm { background: var(--merah-notif); color: white; border: none; padding: 12px; flex: 1; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #eee; color: #666; border: none; padding: 12px; flex: 1; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="modal-password" class="modal-overlay">
    <div class="modal-box">
        <i class="fa-solid fa-lock" style="font-size: 40px; color: var(--merah-notif); margin-bottom: 15px;"></i>
        <h3 id="modal-title" style="margin:0">Verifikasi Akses</h3>
        <p id="modal-desc" style="font-size: 13px; color: #666;">Masukkan password untuk melanjutkan.</p>
        
        <div class="password-container" style="margin-top: 15px;">
            <input type="password" id="input-pass-custom" placeholder="Password">
            <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">BATAL</button>
            <button class="btn-confirm" onclick="eksekusiAksi()">LANJUTKAN</button>
        </div>
    </div>
</div>

<div class="container">
    <h2 id="form-heading"><i class="fa-solid fa-bullhorn"></i> Info Kegiatan Baru</h2>
    
    <div class="form-group">
        <label>Kategori</label>
        <select id="kategori">
            <option value="Ibadah">Ibadah Komsel</option>
            <option value="Penting">Pesan Penting</option>
            <option value="Sosialisasi">Sosialisasi</option>
        </select>
    </div>

    <div class="form-group">
        <label>Judul</label>
        <input type="text" id="judul" placeholder="Judul informasi">
    </div>

    <div class="form-group">
        <label>Lokasi (Opsional)</label>
        <input type="text" id="lokasi" placeholder="Lokasi kegiatan">
    </div>

    <div class="form-group">
        <label>Detail</label>
        <textarea id="detail" rows="4" placeholder="Tuliskan detail..."></textarea>
    </div>

    <button class="btn-send" id="btn-submit" onclick="bukaVerifikasi('kirim')">
        <i class="fa-solid fa-paper-plane"></i> KIRIM SEKARANG
    </button>
    <button class="btn-cancel" id="btn-batal-edit" style="display:none; margin-top:10px; width:100%; border-radius:50px;" onclick="resetForm()">BATAL EDIT</button>

    <div style="margin-top: 30px;">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Informasi</h3>
        <div id="list-pengumuman">Memuat data...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let aksiSekarang = ''; // 'kirim', 'hapus', atau 'update'
    let idTarget = ''; 
    let dataTemp = null;

    // Fungsi Toggle Mata Password
    function togglePassword() {
        const input = document.getElementById('input-pass-custom');
        const icon = document.querySelector('.toggle-password');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    function bukaVerifikasi(aksi, id = '', data = null) {
        aksiSekarang = aksi;
        idTarget = id;
        dataTemp = data;
        
        if(aksi === 'kirim' && (!document.getElementById('judul').value || !document.getElementById('detail').value)) {
            alert("Isi data dulu!"); return;
        }

        document.getElementById('modal-title').innerText = aksi === 'hapus' ? "Konfirmasi Hapus" : "Verifikasi Akses";
        document.getElementById('modal-password').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-password').style.display = 'none';
        document.getElementById('input-pass-custom').value = '';
    }

    async function eksekusiAksi() {
        const pass = document.getElementById('input-pass-custom').value;
        if (pass !== "bukadong821" && pass !== "PKS") {
            alert("Password Salah!"); return;
        }

        closeModal();
        if (aksiSekarang === 'kirim') simpanData();
        else if (aksiSekarang === 'hapus') hapusData();
        else if (aksiSekarang === 'edit_verif') masukModeEdit();
    }

    async function simpanData() {
        const payload = {
            kategori: document.getElementById('kategori').value,
            judul: document.getElementById('judul').value,
            lokasi: document.getElementById('lokasi').value,
            detail: document.getElementById('detail').value,
            lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (idTarget) { // Jika sedang edit
            await db.collection("pengumuman_komsel").doc(idTarget).update(payload);
            alert("Update Berhasil!");
        } else {
            await db.collection("pengumuman_komsel").add(payload);
            alert("Berhasil Kirim!");
        }
        resetForm();
    }

    async function hapusData() {
        await db.collection("pengumuman_komsel").doc(idTarget).delete();
        alert("Data dihapus!");
    }

    function masukModeEdit() {
        document.getElementById('kategori').value = dataTemp.kategori;
        document.getElementById('judul').value = dataTemp.judul;
        document.getElementById('lokasi').value = dataTemp.lokasi;
        document.getElementById('detail').value = dataTemp.detail;
        document.getElementById('form-heading').innerText = "✏️ Edit Informasi";
        document.getElementById('btn-submit').innerHTML = '<i class="fa-solid fa-save"></i> SIMPAN PERUBAHAN';
        document.getElementById('btn-batal-edit').style.display = 'block';
        window.scrollTo(0,0);
    }

    function loadHistory() {
        db.collection("pengumuman_komsel").orderBy("lastUpdate", "desc").onSnapshot(snap => {
            const listDiv = document.getElementById('list-pengumuman');
            listDiv.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                listDiv.innerHTML += `
                    <div class="history-item">
                        <h4>[${d.kategori}] ${d.judul}</h4>
                        <p style="font-size:13px; color:#666;"><i class="fa-solid fa-location-dot"></i> ${d.lokasi || '-'}</p>
                        <p>${d.detail}</p>
                        <div class="action-buttons">
                            <span class="btn-edit" onclick="bukaVerifikasi('edit_verif', '${doc.id}', ${JSON.stringify(d).replace(/"/g, '&quot;')})"><i class="fa-solid fa-pen-to-square"></i> Edit</span>
                            <span class="btn-delete" onclick="bukaVerifikasi('hapus', '${doc.id}')"><i class="fa-solid fa-trash"></i> Hapus</span>
                        </div>
                    </div>`;
            });
        });
    }

    function resetForm() {
        location.reload();
    }

    window.onload = loadHistory;
</script>
</body>
</html>
