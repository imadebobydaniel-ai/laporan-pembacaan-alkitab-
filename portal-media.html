<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #007bff;
            --dark: #333;
            --light: #f4f7f6;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container { max-width: 1000px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-back {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-back:hover { color: var(--primary); }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* --- Style Baru untuk Playlist --- */
        .playlist-config {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            font-size: 14px;
            border: 1px solid #ffeeba;
        }

        .btn-nav {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-nav:hover { background: #e2e6ea; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .table-responsive {
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-gambar { background: #e3f2fd; color: #1976d2; }
        .badge-video_youtube { background: #fff3e0; color: #f57c00; }
        .badge-teks { background: #eeeeee; color: #333333; }
        
        .btn-action { border: none; background: none; cursor: pointer; font-size: 16px; }
        .btn-delete { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">Portal Media</h1>
            <p style="margin:5px 0 0; color:#777; font-size: 13px;">Manajemen Berita & Konten Pondok Pemulihan</p>
        </div>
        <a href="admin.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle" style="color: var(--success);"></i> Tambah Konten Baru</h2>
        <form id="mediaForm">
            <div class="form-group">
                <label>Judul Konten / Berita</label>
                <input type="text" id="judul" placeholder="Contoh: Kegiatan Ibadah Raya Minggu..." required>
            </div>
            
            <div class="form-group">
                <label>Tipe Media</label>
                <select id="tipeMedia" onchange="updateInputMedia()">
                    <option value="gambar">Gambar (Poster/Upload)</option>
                    <option value="video_youtube">Video (YouTube/Link URL)</option>
                    <option value="teks">Text World (Artikel/Berita)</option>
                </select>
            </div>

            <div class="form-group">
                <label id="labelMedia">Upload File Gambar</label>
                <div id="inputMediaWrapper">
                    <input type="file" id="inputMedia" accept="image/*" required>
                </div>
            </div>

            <div class="form-group">
                <label>Deskripsi Singkat</label>
                <textarea id="deskripsi" placeholder="Tuliskan keterangan singkat konten di sini..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                <i class="fas fa-paper-plane"></i> Publikasikan ke Portal
            </button>
        </form>
    </div>

    <div class="card">
        <h2><i class="fas fa-list-ul" style="color: var(--primary);"></i> Daftar Konten Terbit</h2>
        
        <div class="playlist-config">
            <div>
                <label>Mode Putar:</label>
                <select id="modePutar" style="width: auto; padding: 5px;">
                    <option value="berurutan">Berurutan (Normal)</option>
                    <option value="acak">Acak (Shuffle)</option>
                    <option value="loop">Loop (Ulangi Terus)</option>
                </select>
            </div>
            <div>
                <label>Default Durasi (Menit):</label>
                <input type="number" id="defaultDurasi" value="10" style="width: 60px; padding: 5px;">
            </div>
            <button onclick="saveGlobalConfig()" class="btn-submit" style="width: auto; padding: 8px 15px;">Simpan Mode</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Urutan</th>
                        <th>Judul Konten</th>
                        <th>Tipe</th>
                        <th>Durasi (Min)</th>
                        <th style="text-align: center;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="mediaList">
                    <tr>
                        <td colspan="5" style="text-align:center; padding: 30px;">Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Fungsi Update Input Berdasarkan Tipe
    function updateInputMedia() {
        const tipe = document.getElementById('tipeMedia').value;
        const wrapper = document.getElementById('inputMediaWrapper');
        const label = document.getElementById('labelMedia');
        wrapper.innerHTML = ''; 

        if (tipe === 'video_youtube') {
            label.innerText = "Link URL YouTube";
            wrapper.innerHTML = `<input type="text" id="inputMedia" placeholder="https://www.youtube.com/watch?v=..." required>`;
        } else if (tipe === 'teks') {
            label.innerText = "Isi Artikel Lengkap";
            wrapper.innerHTML = `<textarea id="inputMedia" rows="5" placeholder="Tulis artikel..." required></textarea>`;
        } else {
            label.innerText = "Upload File Media";
            wrapper.innerHTML = `<input type="file" id="inputMedia" required>`;
        }
    }

    // Fungsi Load Data
    async function loadMedia() {
        const list = document.getElementById('mediaList');
        try {
            const snapshot = await db.collection("portal_media").orderBy("urutan", "asc").get();
            list.innerHTML = "";
            
            if(snapshot.empty) {
                list.innerHTML = '<tr><td colspan="5" style="text-align:center;">Belum ada konten.</td></tr>';
                return;
            }

            snapshot.forEach((doc, index) => {
                const data = doc.data();
                const id = doc.id;
                const badgeClass = "badge-" + data.tipe;
                
                list.innerHTML += `
                    <tr>
                        <td>
                            <button class="btn-nav" onclick="pindahUrutan('${id}', -1)"><i class="fas fa-chevron-up"></i></button>
                            <span style="margin: 0 10px; font-weight: bold;">${data.urutan || index + 1}</span>
                            <button class="btn-nav" onclick="pindahUrutan('${id}', 1)"><i class="fas fa-chevron-down"></i></button>
                        </td>
                        <td><strong>${data.judul}</strong></td>
                        <td><span class="badge ${badgeClass}">${data.tipe}</span></td>
                        <td>
                            <input type="number" value="${data.durasi || 10}" 
                                   onchange="updateDurasi('${id}', this.value)" 
                                   style="width: 50px; padding: 2px;">
                        </td>
                        <td style="text-align: center;">
                            <button class="btn-action btn-delete" onclick="deleteMedia('${id}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        } catch (e) { console.error(e); }
    }

    // Fungsi Simpan Konten Baru
    document.getElementById('mediaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        
        const judul = document.getElementById('judul').value;
        const tipe = document.getElementById('tipeMedia').value;
        const inputElement = document.getElementById('inputMedia');
        const snapshot = await db.collection("portal_media").get();
        
        let finalUrl = "";
        try {
            if (inputElement.files && inputElement.files[0]) {
                const file = inputElement.files[0];
                const storageRef = storage.ref('portal_media/' + Date.now() + "_" + file.name);
                await storageRef.put(file);
                finalUrl = await storageRef.getDownloadURL();
            } else {
                finalUrl = inputElement.value;
            }

            await db.collection("portal_media").add({
                judul: judul,
                tipe: tipe,
                url: finalUrl,
                urutan: snapshot.size + 1,
                durasi: parseInt(document.getElementById('defaultDurasi').value),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Berhasil!");
            e.target.reset();
            loadMedia();
        } catch (err) { alert(err.message); }
        btn.disabled = false;
    });

    // Fungsi Tambahan (Urutan, Durasi, Config)
    async function pindahUrutan(id, arah) {
        const ref = db.collection("portal_media");
        const doc = await ref.doc(id).get();
        const urutanSekarang = doc.data().urutan;
        const urutanBaru = urutanSekarang + arah;
        if (urutanBaru < 1) return;

        const swapQuery = await ref.where("urutan", "==", urutanBaru).get();
        const batch = db.batch();
        if (!swapQuery.empty) {
            batch.update(ref.doc(swapQuery.docs[0].id), { urutan: urutanSekarang });
        }
        batch.update(ref.doc(id), { urutan: urutanBaru });
        await batch.commit();
        loadMedia();
    }

    async function updateDurasi(id, menit) {
        await db.collection("portal_media").doc(id).update({ durasi: parseInt(menit) });
    }

    async function saveGlobalConfig() {
        const mode = document.getElementById('modePutar').value;
        await db.collection("config").doc("playlist").set({ mode: mode });
        alert("Mode Putar Disimpan!");
    }

    async function deleteMedia(id) {
        if(confirm("Hapus?")) {
            await db.collection("portal_media").doc(id).delete();
            loadMedia();
        }
    }

    window.onload = loadMedia;
</script>

</body>
</html>
